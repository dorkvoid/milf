<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Milf Machine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            margin: 0;
            overflow: hidden; /* Strictly locks page */
            color: #f8fafc;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Prevents accidental blue text selection on rapid taps */
            -webkit-user-select: none;
            height: 100dvh; /* Modern mobile sizing */
        }

        .title-font {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 3px;
        }

        /* Machine Aesthetics */
        .machine-body {
            background: linear-gradient(145deg, #cbd5e1, #94a3b8);
            box-shadow: 
                inset 0px 5px 10px rgba(255,255,255,0.5),
                inset 0px -5px 15px rgba(0,0,0,0.3),
                0px 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .machine-screen {
            background: #ffffff;
            box-shadow: inset 0px 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .reel-row {
            position: relative;
            width: 100%;
        }

        .reel-row::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .reel-column {
            position: relative;
            overflow: hidden;
            height: 80px;
            flex: 1;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .reel-column:hover {
            background-color: rgba(241, 245, 249, 0.5);
        }

        .reel-inner {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .reel-item {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.75rem;
            color: #1e293b;
            padding: 0 0.25rem;
            text-transform: uppercase;
            word-break: break-word;
        }

        /* 2D CSS Rocker Switch */
        .css-rocker-case {
            width: 50px;
            height: 100px;
            background: #020617; 
            border-radius: 6px;
            border: 2px solid #334155;
            box-shadow: inset 0 10px 15px rgba(0,0,0,0.9), 0 2px 2px rgba(255,255,255,0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            perspective: 300px; 
        }

        .css-rocker-switch {
            width: 40px;
            height: 90px;
            background: linear-gradient(to bottom, #475569, #1e293b);
            border-radius: 4px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            transform-style: preserve-3d;
            padding: 10px 0;
        }

        .rocker-milf {
            transform: rotateX(25deg);
            box-shadow: 0 10px 10px -5px rgba(0,0,0,0.8), inset 0 -2px 5px rgba(255,255,255,0.2);
            border-bottom: 2px solid #94a3b8;
            border-top: 2px solid #000;
        }

        .rocker-dilf {
            transform: rotateX(-25deg);
            box-shadow: 0 -10px 10px -5px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.2);
            border-top: 2px solid #94a3b8;
            border-bottom: 2px solid #000;
        }

        .rocker-ridge {
            width: 60%;
            height: 3px;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            border-radius: 1px;
        }

        /* 2D CSS Arcade Button */
        .css-btn-pillar {
            width: 100px;
            height: 180px;
            background: linear-gradient(to right, #1e293b, #0f172a);
            border-left: 2px solid #334155;
            border-right: 2px solid #020617;
            border-bottom: 8px solid #020617;
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.8);
            cursor: pointer;
        }

        .css-btn-collar {
            width: 80px;
            height: 80px;
            background: #020617;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.9), 0 2px 2px rgba(255,255,255,0.1);
        }

        .css-btn-cap {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), inset 2px 2px 10px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.6);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .css-btn-pillar:active .css-btn-cap {
            transform: scale(0.95) translateY(4px);
            box-shadow: inset -2px -2px 8px rgba(0,0,0,0.5), inset 1px 1px 5px rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.6);
        }

        /* Glass Output Box & Scrolling fix */
        .output-box {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            height: 180px;
            position: relative;
            overflow: hidden; /* Fixes the accent bar from scrolling */
            display: flex;
        }

        .scroll-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            height: 100%;
            display: flex;
            align-items: center;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        .scroll-wrapper::-webkit-scrollbar { width: 6px; }
        .scroll-wrapper::-webkit-scrollbar-track { background: transparent; }
        .scroll-wrapper::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .allow-select {
            user-select: text; /* Allow user to copy output text */
            -webkit-user-select: text;
        }

        /* Metal Shutter */
        .metal-shutter {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #475569 0%, #334155 50%, #1e293b 100%);
            border-bottom: 4px solid #0f172a;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.5, 0, 0.2, 1);
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.5);
        }

        .shutter-open { transform: translateY(-100%); }

        /* Particle Burst Animation */
        .burst-line {
            position: absolute;
            width: 4px;
            height: 16px;
            background-color: white;
            border-radius: 2px;
            transform-origin: center bottom;
            animation: burstOut 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes burstOut {
            0% { opacity: 1; transform: rotate(var(--rot)) translateY(-15px) scaleY(0.5); }
            100% { opacity: 0; transform: rotate(var(--rot)) translateY(-50px) scaleY(1.2); }
        }

        /* Interactive Tutorial Styles */
        #tutorial-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        .hidden-tutorial { opacity: 0 !important; pointer-events: none !important; }
        
        .tutorial-highlight {
            z-index: 10001 !important;
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.6), 0 0 25px rgba(59, 130, 246, 0.8) !important;
            border-radius: 12px;
            /* Removed pointer-events: auto to prevent accidental state-breaking clicks during tutorial */
            background-color: inherit;
        }
        .tutorial-highlight:not(.absolute) {
            position: relative !important;
        }
        
        #tut-tooltip {
            position: absolute;
            background: #1e293b;
            border: 2px solid #3b82f6;
            padding: 1.2rem;
            border-radius: 0.75rem;
            width: 280px;
            z-index: 10002;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
        }
        #tut-tooltip.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .tutorial-arrow {
            position: absolute;
            width: 0; height: 0;
            border-style: solid;
        }
        .arrow-top { border-width: 0 12px 12px 12px; border-color: transparent transparent #3b82f6 transparent; top: -14px; left: 50%; transform: translateX(-50%); }
        .arrow-bottom { border-width: 12px 12px 0 12px; border-color: #3b82f6 transparent transparent transparent; bottom: -14px; left: 50%; transform: translateX(-50%); }

        @media (max-width: 768px) {
            .reel-item { font-size: 0.65rem; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-2 sm:p-4 relative">

    <!-- Journal Slide-out Panel -->
    <div id="journal-panel" class="fixed top-0 right-0 h-full w-full max-w-sm sm:max-w-md bg-slate-900/95 backdrop-blur-xl border-l border-slate-700 z-[10000] transform translate-x-full transition-transform duration-400 ease-in-out flex flex-col shadow-2xl">
        <div class="p-5 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
            <h2 class="title-font text-2xl text-slate-100 tracking-wider flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Favorites Journal
            </h2>
            <button onclick="toggleJournal()" class="text-slate-400 hover:text-white transition-colors p-2 rounded-full hover:bg-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div id="journal-list" class="flex-grow overflow-y-auto p-4 space-y-4 pb-20 allow-select">
            <!-- Items injected by JS -->
        </div>
    </div>

    <!-- Journal Open Button -->
    <button id="journal-btn" onclick="toggleJournal()" class="absolute top-4 left-4 w-10 h-10 bg-slate-800 border border-slate-600 rounded-full flex items-center justify-center text-slate-300 hover:text-white hover:bg-slate-700 transition-colors z-50 shadow-lg" title="Open Favorites">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z" /></svg>
    </button>

    <!-- Tutorial Overlay Background -->
    <div id="tutorial-overlay" class="hidden-tutorial pointer-events-auto"></div>

    <!-- Dynamic Tutorial Tooltip -->
    <div id="tut-tooltip">
        <div id="tut-arrow" class="tutorial-arrow"></div>
        <h3 id="tut-title" class="title-font text-2xl mb-1 text-blue-400 tracking-wide">Step 1</h3>
        <p id="tut-text" class="text-sm text-slate-300 mb-4 leading-relaxed font-semibold">Explanation text goes here.</p>
        <div class="flex justify-between items-center">
            <button id="tut-prev" class="text-slate-400 hover:text-white text-sm px-3 py-1.5 hidden bg-slate-700 hover:bg-slate-600 rounded-md transition-colors" onclick="prevTutStep()">Back</button>
            <div class="flex-grow text-center text-xs text-slate-400 font-bold tracking-widest" id="tut-progress">1/3</div>
            <button id="tut-next" class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-1.5 px-6 rounded-full transition-colors shadow-lg shadow-blue-500/30" onclick="nextTutStep()">Next</button>
        </div>
    </div>

    <!-- Help Button -->
    <button onclick="startTutorial()" class="absolute top-4 right-4 w-10 h-10 bg-slate-800 border border-slate-600 rounded-full flex items-center justify-center text-slate-300 hover:text-white hover:bg-slate-700 transition-colors z-50 shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
    </button>

    <div class="w-full max-w-5xl flex flex-col items-center gap-2 h-full justify-center">
        
        <!-- Header -->
        <div class="flex flex-col items-center gap-1 text-center w-full z-40">
            <h1 id="main-title" class="title-font text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-red-600 drop-shadow-lg transition-all duration-500">
                THE MILF MACHINE
            </h1>
            <p class="text-sm md:text-base text-slate-400 italic mb-2">The randomized character generator for making the perfect parent!</p>

            <!-- Mobile Toggle (Hidden on Desktop) -->
            <div id="mobile-switch-container" class="md:hidden flex items-center justify-center gap-4 bg-gray-900/80 px-6 py-2 rounded-full border border-gray-700/50 shadow-inner">
                <span id="mobile-label-milf" class="font-bold text-lg tracking-widest text-red-400 cursor-pointer" onclick="forceMobileToggle('MILF')">MILF</span>
                <div class="relative w-14 h-7 bg-gray-700 rounded-full cursor-pointer shadow-inner" onclick="toggleMobileMode()">
                    <div id="mobile-toggle-knob" class="absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform duration-300 shadow-md transform translate-x-0"></div>
                </div>
                <span id="mobile-label-dilf" class="font-bold text-lg tracking-widest text-gray-500 cursor-pointer" onclick="forceMobileToggle('DILF')">DILF</span>
            </div>
        </div>

        <!-- Main Machine Layout -->
        <div class="flex flex-row items-center justify-center gap-4 w-full">
            
            <!-- 2D CSS Rocker Switch (Desktop Only) -->
            <div class="hidden md:flex flex-col items-center gap-2 w-20">
                <span id="desk-label-milf" class="font-bold tracking-widest text-red-400 transition-colors">MILF</span>
                <div id="desktop-rocker-case" class="css-rocker-case" onclick="toggleMode()">
                    <div class="css-rocker-switch rocker-milf" id="desktop-rocker">
                        <div id="rocker-led" class="w-1/2 h-1.5 rounded-full mb-1 bg-red-500 shadow-[0_0_8px_#ef4444] transition-colors duration-300"></div>
                        <div class="rocker-ridge"></div>
                        <div class="rocker-ridge"></div>
                        <div class="rocker-ridge"></div>
                        <div class="rocker-ridge"></div>
                    </div>
                </div>
                <span id="desk-label-dilf" class="font-bold tracking-widest text-gray-500 transition-colors">DILF</span>
            </div>

            <!-- The Slot Machine -->
            <div class="relative w-full max-w-2xl flex-grow">
                <div class="machine-body rounded-2xl p-2 md:p-4 border-4 border-gray-500">
                    <div id="machine-screen-tut" class="machine-screen rounded-xl border-8 border-gray-800 flex flex-col relative overflow-hidden bg-white">
                        
                        <!-- The Metal Shutter -->
                        <div id="metal-shutter" class="metal-shutter">
                            <span id="shutter-text" class="title-font text-3xl tracking-widest text-red-400 animate-pulse drop-shadow-md">AWAITING PUSH</span>
                        </div>

                        <!-- Top Row -->
                        <div class="reel-row flex relative border-b-4 border-gray-800">
                            <div class="reel-column border-r-2 border-gray-200" onclick="handleSingleSpin(0)"><div class="reel-inner" id="reel-0"></div></div>
                            <div class="reel-column border-r-2 border-gray-200" onclick="handleSingleSpin(1)"><div class="reel-inner" id="reel-1"></div></div>
                            <div class="reel-column" onclick="handleSingleSpin(2)"><div class="reel-inner" id="reel-2"></div></div>
                        </div>

                        <!-- Bottom Row -->
                        <div class="reel-row flex relative">
                            <div class="reel-column border-r-2 border-gray-200" onclick="handleSingleSpin(3)"><div class="reel-inner" id="reel-3"></div></div>
                            <div class="reel-column border-r-2 border-gray-200" onclick="handleSingleSpin(4)"><div class="reel-inner" id="reel-4"></div></div>
                            <div class="reel-column" onclick="handleSingleSpin(5)"><div class="reel-inner" id="reel-5"></div></div>
                        </div>
                    </div>

                    <!-- Mobile Spin Button -->
                    <button id="mobile-spin-btn" class="md:hidden w-full mt-4 bg-gradient-to-b from-red-500 to-red-700 text-white font-bold text-xl py-3 rounded-xl border-b-4 border-red-900 active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest title-font shadow-lg relative z-40">
                        Push To Spin!
                    </button>
                </div>
            </div>

            <!-- 2D CSS Arcade Button (Desktop Only) -->
            <div class="hidden md:flex w-24 justify-center">
                <div class="css-btn-pillar" id="desktop-btn" onmousedown="triggerSpin(event)" onmouseup="releaseSpin()" onmouseleave="releaseSpin()">
                    <div class="css-btn-collar">
                        <div class="css-btn-cap" id="btn-cap" style="background: radial-gradient(circle at 30% 30%, #f87171, #dc2626);">
                            <!-- Clean Phosphor Hand Pointer Icon -->
                            <i class="ph-fill ph-hand-pointing text-[40px] text-white/95 drop-shadow-md"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Character Output Box -->
        <div class="w-full max-w-3xl mt-2 relative flex flex-col items-center">
            <!-- Modified for fixed left accent and scrollable text -->
            <div class="output-box rounded-xl shadow-2xl relative flex w-full" id="output-container">
                <div id="output-accent" class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-red-400 to-red-600 transition-colors duration-500 rounded-l-xl z-10 pointer-events-none"></div>
                <div class="scroll-wrapper pl-6 pr-4 sm:pl-8 sm:pr-6 allow-select" id="scroll-wrapper">
                    <div id="output-sentence" class="text-base md:text-lg w-full font-medium leading-relaxed my-auto">
                        <p class="opacity-50 italic text-center text-slate-300">Push the button to generate your character...</p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons (Beneath the box) -->
            <div id="action-buttons" class="w-full flex justify-end gap-3 mt-3 opacity-0 pointer-events-none transition-all duration-300 z-30 px-2 sm:px-0">
                <!-- Save Button -->
                <button id="save-btn" onclick="saveToJournal()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 hover:text-yellow-400 px-4 py-2 rounded-lg transition-colors border border-slate-600 shadow-md flex items-center gap-2 group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>
                    <span id="save-text" class="text-sm font-bold uppercase tracking-wider">Save</span>
                </button>
                <!-- Copy Button -->
                <button id="copy-btn" onclick="copyCharacter()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 hover:text-white px-4 py-2 rounded-lg transition-all duration-300 flex items-center gap-2 border border-slate-600 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                    <span id="copy-text" class="text-sm font-bold uppercase tracking-wider">Copy</span>
                </button>
            </div>
        </div>

    </div>

        function executeSpin() {
            document.getElementById('output-container').style.opacity = '0.3';
            const data = gameData[currentMode];
            let completedReels = 0;

            // --- EXTREMELY RARE EASTER EGG (1 in 2000 chance) ---
            let isTorielEgg = false;
            if (currentMode === 'MILF' && Math.random() < 0.0005) { 
                isTorielEgg = true;
            }
            const torielTraits = [
                "ageless era",

            // ---------------------------------------------------

            reelContainers.forEach((container, i) => {
                const itemsCount = data.reels[i].length;
                const targetFinalIndex = Math.floor(Math.random() * itemsCount);
                const totalItemsInDOM = container.children.length;
                const stopIndex = totalItemsInDOM - itemsCount + targetFinalIndex;
                const duration = 1.5 + (i * 0.4); 

                // If Toriel egg triggered, forcefully inject her exact traits into the landing slot
                if (isTorielEgg) {
                    container.children[stopIndex].dataset.text = torielTraits[i];
                    container.children[stopIndex].textContent = torielTraits[i];
                }

                container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.1, 1)`;
                container.style.transform = `translateY(-${stopIndex * itemHeight}px)`;

                setTimeout(() => {
                    currentResults[i] = container.children[stopIndex].dataset.text;
                    completedReels++;
                    if (completedReels === reelContainers.length) {
                        finishSpin();
                        resetReelsForNextSpin(); // Allows infinite spins
                    }
                }, duration * 1000);
            });
        }

            container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.1, 1)`;
            container.style.transform = `translateY(-${stopIndex * itemHeight}px)`;

            setTimeout(() => {
                currentResults[reelIndex] = container.children[stopIndex].dataset.text;
                finishSpin();
                resetReelsForNextSpin();

        // Feature: Copy Character Text
        function copyCharacter() {
            if(!outputSentence || outputSentence.innerText.includes("Push the button")) return;
            
            // Clean up the text for copying
            const cleanText = outputSentence.innerText;
            
            // Create a temporary text area to copy from (ensures cross-device compatibility)
            const textArea = document.createElement("textarea");
            textArea.value = cleanText;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                const copyText = document.getElementById('copy-text');
                const copyBtn = document.getElementById('copy-btn');
                
                // Visual feedback
                copyText.innerText = "Copied!";
                copyBtn.classList.replace('text-slate-200', 'text-green-400');

                    copyBtn.classList.replace('border-green-500', 'border-slate-500');

                console.error('Failed to copy text', err);

            document.body.removeChild(textArea);

        function saveToJournal() {

        function resetReelsForNextSpin() {
            // Secretly resets the transform without animation so you never run out of items
            const data = gameData[currentMode];
            reelContainers.forEach((container, index) => {
                const currentText = currentResults[index];
                container.style.transition = 'none';
                
                const items = data.reels[index];
                let html = '';
                const fullList = [];
                for(let i=0; i<spinMultiplier; i++) { fullList.push(...shuffleArray([...items])); }
                
                // Ensure current item is at the start
                const shuffledEnds = shuffleArray([...items]);
                shuffledEnds[0] = currentText; 
                fullList.push(...shuffledEnds);

                fullList.forEach(text => { html += `<div class="reel-item" data-text="${text.replace(/"/g, '&quot;')}">${text}</div>`; });
                container.innerHTML = html;
                
                // Point it to the first item (which is our current result)
                const targetIndex = fullList.length - items.length;
                container.style.transform = `translateY(-${targetIndex * itemHeight}px)`;
                
                // Force reflow
                container.offsetHeight; 
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let currentHighlightEl = null;

        function startTutorial() {
            document.getElementById('tutorial-overlay').classList.remove('hidden-tutorial');
            document.getElementById('tut-tooltip').classList.add('visible');
            currentTutStep = 0;
            renderTutStep();
        }

        function endTutorial() {
            document.getElementById('tutorial-overlay').classList.add('hidden-tutorial');
            document.getElementById('tut-tooltip').classList.remove('visible');
            if (currentHighlightEl) {
                currentHighlightEl.classList.remove('tutorial-highlight');
                currentHighlightEl = null;
            }
            try { localStorage.setItem('milfMachineTutorial', 'seen'); } catch(e){}
        }

        function renderTutStep() {
            const step = tutorialSteps[currentTutStep];
            const isMobile = window.innerWidth < 768;
            const targetId = isMobile ? step.mobTarget : step.deskTarget;
            const targetEl = document.getElementById(targetId);

            if (currentHighlightEl) currentHighlightEl.classList.remove('tutorial-highlight');
            
            if (targetEl) {
                targetEl.classList.add('tutorial-highlight');
                currentHighlightEl = targetEl;
                positionTooltip(targetEl, step.placement);
            } else {
                // Failsafe if target doesn't exist
                endTutorial();
                return;
            }

            document.getElementById('tut-title').textContent = step.title;
            document.getElementById('tut-text').textContent = step.text;
            document.getElementById('tut-progress').textContent = `${currentTutStep + 1} / ${tutorialSteps.length}`;
            
            const prevBtn = document.getElementById('tut-prev');
            const nextBtn = document.getElementById('tut-next');
            
            prevBtn.style.display = currentTutStep > 0 ? 'block' : 'none';
            
            if (currentTutStep === tutorialSteps.length - 1) {
                nextBtn.textContent = 'Got it!';
                nextBtn.classList.replace('bg-blue-500', 'bg-green-500');
                nextBtn.classList.replace('hover:bg-blue-600', 'hover:bg-green-600');
            } else {
                nextBtn.textContent = 'Next';
                nextBtn.classList.replace('bg-green-500', 'bg-blue-500');
                nextBtn.classList.replace('hover:bg-green-600', 'hover:bg-blue-600');
            }
        }

        function nextTutStep() {
            if (currentTutStep < tutorialSteps.length - 1) {
                currentTutStep++;
                renderTutStep();
            } else {
                endTutorial();
            }
        }

        function prevTutStep() {
            if (currentTutStep > 0) {
                currentTutStep--;
                renderTutStep();
            }
        }

        function positionTooltip(targetEl, placement) {
            const rect = targetEl.getBoundingClientRect();
            const tooltip = document.getElementById('tut-tooltip');
            const arrow = document.getElementById('tut-arrow');
            
            arrow.className = 'tutorial-arrow';
            
            const isHidden = !tooltip.classList.contains('visible');
            if (isHidden) tooltip.style.opacity = '0';
            
            const ttWidth = 280; 
            const ttHeight = tooltip.offsetHeight || 130; 

            let top = 0, left = 0;
            const scrollY = window.scrollY;
            const scrollX = window.scrollX;

            if (placement === 'bottom') {
                top = rect.bottom + scrollY + 18;
                left = rect.left + scrollX + (rect.width / 2) - (ttWidth / 2);
                arrow.classList.add('arrow-top');
            } else if (placement === 'top') {
                top = rect.top + scrollY - ttHeight - 18;
                left = rect.left + scrollX + (rect.width / 2) - (ttWidth / 2);
                arrow.classList.add('arrow-bottom');
            }

            const margin = 10;
            if (left < margin) left = margin;
            if (left + ttWidth > window.innerWidth - margin) left = window.innerWidth - ttWidth - margin;

            tooltip.style.top = `${top}px`;
            tooltip.style.left = `${left}px`;
            
            if (isHidden) tooltip.style.opacity = '';
        }

        // Failsafe tutorial resizing
        window.addEventListener('resize', () => {
            if (document.getElementById('tut-tooltip').classList.contains('visible')) {
                // Safely dismiss tutorial if screen is resized significantly to prevent placement bugs
                endTutorial();
            }
        });

        mobileSpinBtn.addEventListener('click', (e) => {
            if(!document.getElementById('tutorial-overlay').classList.contains('hidden-tutorial')) return;
            const rect = mobileSpinBtn.getBoundingClientRect();
            showBurst(e.clientX || rect.left + rect.width / 2, e.clientY || rect.top + rect.height / 2);
            handleSpin();
        });

        window.onload = () => {
            initMachine();
            let seenTutorial = false;
            try { seenTutorial = localStorage.getItem('milfMachineTutorial') === 'seen'; } catch(e){}
            
            if (!seenTutorial) {
                setTimeout(() => startTutorial(), 500);
            } else {
                document.getElementById('tutorial-overlay').classList.add('hidden-tutorial');
            }
        };
    </script>
</body>
</html>
