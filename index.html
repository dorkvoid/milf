<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Character Machine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            margin: 0;
            overflow-x: hidden;
            color: #f8fafc;
            min-height: 100vh;
        }

        .title-font {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 3px;
        }

        .machine-body {
            background: linear-gradient(145deg, #cbd5e1, #94a3b8);
            box-shadow: 
                inset 0px 5px 10px rgba(255,255,255,0.5),
                inset 0px -5px 15px rgba(0,0,0,0.3),
                0px 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .machine-screen {
            background: #ffffff;
            box-shadow: inset 0px 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .reel-row {
            position: relative;
            width: 100%;
        }

        .reel-row::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .reel-column {
            position: relative;
            overflow: hidden;
            height: 100px;
            flex: 1; 
        }

        .reel-inner {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .reel-item {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.8rem;
            color: #1e293b;
            padding: 0 0.5rem;
            text-transform: uppercase;
            word-break: break-word;
            line-height: 1.1;
        }

        /* Glassmorphism Adlib Box */
        .glassy-output {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: opacity 0.4s ease;
            min-height: 160px; /* Reduced to fit the screen better */
            display: flex; 
            flex-direction: column;
            justify-content: center;
            color: #f8fafc;
        }

        /* Adjusted text sizes to prevent wrapping and layout shift */
        #output-sentence p {
            margin-bottom: 0.5rem; 
        }

        /* 3D Canvas Container */
        #three-lever-container {
            position: absolute;
            right: -130px;
            top: 50%;
            transform: translateY(-50%);
            width: 160px; 
            height: 320px; 
            z-index: 20;
            cursor: grab;
        }

        #three-lever-container:active {
            cursor: grabbing;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            #three-lever-container { right: -90px; transform: translateY(-50%) scale(0.85); }
        }

        @media (max-width: 850px) {
            #three-lever-container { right: -60px; transform: translateY(-50%) scale(0.7); }
            .reel-item { font-size: 0.75rem; padding: 0 0.25rem; }
        }

        @media (max-width: 640px) {
            #three-lever-container { display: none; }
            .reel-item { font-size: 0.65rem; padding: 0 0.15rem; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center py-2 px-4 h-screen overflow-hidden m-0">

    <div class="w-full max-w-4xl flex flex-col items-center gap-2 relative">
        
        <!-- Header -->
        <div class="flex flex-col items-center gap-0 text-center w-full">
            <h1 id="main-title" class="title-font text-4xl md:text-5xl text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-red-600 drop-shadow-lg transition-all duration-500">
                THE M.I.L.F. MACHINE
            </h1>

            <!-- Mode Toggle Switch -->
            <div class="flex items-center justify-center gap-3 mt-2 mb-1 bg-gray-900/50 px-4 py-2 rounded-full border border-gray-700/50 shadow-inner scale-90">
                <span id="label-milf" class="font-bold text-lg tracking-widest text-red-400 transition-colors duration-300">MILF</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="mode-toggle" class="sr-only peer">
                    <div class="w-14 h-7 bg-red-500 peer-focus:outline-none rounded-full peer shadow-inner transition-colors duration-300 peer-checked:bg-blue-500"></div>
                    <div class="absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform duration-300 peer-checked:translate-x-7 shadow-md"></div>
                </label>
                <span id="label-dilf" class="font-bold text-lg tracking-widest text-gray-500 transition-colors duration-300">DILF</span>
            </div>
        </div>

        <!-- Slot Machine Wrapper -->
        <div class="relative w-full max-w-3xl mt-1">
            
            <!-- Machine Body -->
            <div class="machine-body rounded-3xl p-3 border-4 border-gray-500 relative">
                
                <!-- Reel Screen (2 Rows of 3) -->
                <div class="machine-screen rounded-xl border-8 border-gray-800 flex flex-col relative overflow-hidden bg-white">
                    
                    <!-- Top Row -->
                    <div class="reel-row flex relative border-b-4 border-gray-800">
                        <div class="payline absolute top-1/2 left-0 right-0 h-[3px] -translate-y-1/2 z-20 pointer-events-none transition-colors duration-400 bg-red-500/60 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                        <!-- Reel 0: Age -->
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-0"></div></div>
                        <!-- Reel 1: Size -->
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-1"></div></div>
                        <!-- Reel 2: Personality (Dynamically randomized pair) -->
                        <div class="reel-column"><div class="reel-inner" id="reel-2"></div></div>
                    </div>

                    <!-- Bottom Row -->
                    <div class="reel-row flex relative">
                        <div class="payline absolute top-1/2 left-0 right-0 h-[3px] -translate-y-1/2 z-20 pointer-events-none transition-colors duration-400 bg-red-500/60 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                        <!-- Reel 3: Clothing -->
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-3"></div></div>
                        <!-- Reel 4: Accessory (Replaced Acronym) -->
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-4"></div></div>
                        <!-- Reel 5: Hobby -->
                        <div class="reel-column"><div class="reel-inner" id="reel-5"></div></div>
                    </div>
                </div>

                <!-- Mobile Spin Button -->
                <button id="mobile-spin-btn" class="sm:hidden w-full mt-4 bg-gradient-to-b from-red-500 to-red-700 text-white font-bold text-lg py-3 rounded-xl border-b-4 border-red-900 active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest title-font shadow-lg">
                    Pull Lever!
                </button>
            </div>

            <!-- The 3D Lever Container -->
            <div id="three-lever-container"></div>
        </div>

        <!-- Glassy Output Box (Character Generated Brick) -->
        <div class="glassy-output rounded-2xl p-4 md:p-6 w-full max-w-2xl mt-3 relative overflow-hidden" id="output-container">
            <div id="output-sentence" class="text-base md:text-lg font-medium">
                <p class="opacity-50 italic text-center py-4">Pull the lever to generate your character...</p>
            </div>
        </div>

    </div>

    <script>
        // --- DYNAMIC PERSONALITY MIXER ---
        // Pairs two adjectives to create exponential, highly cohesive combinations
        function generateRandomPersonalities(count) {
            const adj1 = ["warm", "chaotic", "stoic", "sweet", "bold", "organized", "relaxed", "nerdy", "sarcastic", "stern", "bubbly", "brooding", "loud", "shy", "fierce", "gentle", "wild", "sassy", "calm", "dramatic", "pragmatic", "dreamy", "cynical", "goofy", "intense", "lazy", "energetic", "aloof", "clingy", "spiteful", "forgiving", "honest", "secretive", "open", "generous", "vain", "humble", "stubborn", "flexible", "impulsive", "cautious", "whimsical", "grumpy", "anxious", "neurotic", "hyperactive", "tranquil", "optimistic", "pessimistic", "flirty", "reserved", "extravagant", "frugal", "scatterbrained", "meticulous", "chill", "unhinged", "bored", "exhausted", "passionate", "vibrant", "moody"];
            const adj2 = ["loving", "fun", "observant", "caring", "brash", "driven", "chill", "quirky", "witty", "strict", "bright", "mysterious", "proud", "timid", "loyal", "kind", "free", "snarky", "collected", "extra", "logical", "romantic", "jaded", "silly", "focused", "lethargic", "peppy", "distant", "needy", "petty", "pure", "blunt", "sly", "vulnerable", "giving", "conceited", "modest", "rigid", "adaptable", "rash", "wary", "magical", "tired", "apathetic", "judgmental", "supportive", "passive-aggressive", "overbearing", "protective", "independent", "fierce", "soft-hearted", "ruthless", "gentle", "eccentric", "traditional", "rebellious", "unpredictable", "reliable"];
            
            let mixed = [];
            for(let i=0; i<count; i++) {
                let a = adj1[Math.floor(Math.random() * adj1.length)];
                let b = adj2[Math.floor(Math.random() * adj2.length)];
                let conj = Math.random() > 0.5 ? "yet" : "and";
                mixed.push(`${a} ${conj} ${b}`);
            }
            return mixed;
        }

        // Acronyms specifically curated to fit "I'd [phrase]"
        const lfAcronyms = [
            "Like to Finance", "Listen to Forever", "Leave Flowers for", "Look at Fondly", 
            "Learn French with", "Laugh with Forever", "Lend Funds to", "Love Fiercely", "Live For", 
            "Lift Furniture for", "Launch Fireworks with", "Lose Focus over", "Like to Flirt with", "Love to Flatter", 
            "Lend Favors to", "Look For", "Listen to Frequently", "Leave Fortune to", "Lead Forward", 
            "Love Faithfully", "Learn Facts from", "Live Freely with", "Like to Follow", "Look Fabulous for"
        ];

        // Refined Options ensuring cohesive ad-libs and flow
        const gameData = {
            MILF: {
                title: "THE M.I.L.F. MACHINE",
                noun: "mother",
                colors: ["from-red-400", "to-red-600", "bg-red-500/60", "border-red-900", "rgba(239,68,68,0.8)", "text-red-400", 0xff4444],
                reels: [
                    // Reel 0: Age (Removed "going on" idioms to ensure clean flow)
                    ["20s", "30s", "40s", "50s", "60s", "70s", "80s", "early 20s", "mid 20s", "late 20s", "early 30s", "mid 30s", "late 30s", "early 40s", "mid 40s", "late 40s", "early 50s", "mid 50s", "late 50s", "early 60s", "mid 60s", "late 60s", "early 70s", "mid 70s", "late 70s", "early 80s", "prime", "golden years", "roaring 20s", "dirty 30s", "fabulous 40s", "nifty 50s"],
                    
                    // Reel 1: Size
                    ["petite powerhouse", "tall queen", "cozy bear", "statuesque goddess", "tiny terror", "curvy icon", "athletic dynamo", "slender sprite", "voluptuous vixen", "majestic swan", "fierce lioness", "gentle doe", "mama bear", "boss lady", "gym rat", "Amazonian warrior", "pocket-sized powerhouse", "thicc queen", "muscle mommy", "curvy matron", "willowy waif", "sturdy farmgirl", "lanky beanpole", "compact dynamo"],
                    
                    // Reel 2: Personality
                    generateRandomPersonalities(40),
                    
                    // Reel 3: Clothing
                    ["a sports bra and a long skirt", "a tailored pantsuit", "yoga pants and an oversized tee", "a vintage floral dress", "high-waisted mom jeans and a cozy sweater", "a breezy yellow sundress", "a matching velour tracksuit", "a leather jacket and ripped jeans", "matching silk pajamas", "denim overalls and a striped shirt", "a classic trench coat", "a flowy maxi skirt", "a sharp blazer", "baggy sweatpants", "a tight pencil skirt", "a bright summer romper", "an oversized flannel", "a chunky knit cardigan"],
                    
                    // Reel 4: Accessory
                    ["a massive sun hat", "a silk scarf", "a sensible cardigan", "a pristine white visor", "a yoga mat strapped to her back", "three different reusable water bottles", "a perfectly organized planner", "way too many shopping bags", "an aggressively large diamond ring", "a small, angry dog in a purse", "a terrifyingly sharp stiletto nail set", "a giant Stanley cup", "sensible heels", "chunky combat boots", "a messy bun and sunglasses", "a designer handbag", "reading glasses on a chain"],
                    
                    // Reel 5: Hobby
                    ["collecting massive houseplants", "drinking expensive wine at 3 PM", "reorganizing the pantry out of spite", "running half-marathons for fun", "intimidating the local PTA", "doomscrolling on the couch", "baking aggressive amounts of sourdough", "gossiping aggressively at brunch", "doing intensive yoga", "managing a very successful MLM", "watching true crime documentaries", "renovating her entire house alone", "reading spicy romance novels", "yelling at referees at youth soccer", "making unnecessarily complex crafts", "fostering too many rescue dogs"]
                ]
            },
            DILF: {
                title: "THE D.I.L.F. DEVICE",
                noun: "father",
                colors: ["from-blue-400", "to-blue-600", "bg-blue-500/60", "border-blue-900", "rgba(59,130,246,0.8)", "text-blue-400", 0x4444ff],
                reels: [
                    // Reel 0: Age (Removed idioms)
                    ["20s", "30s", "40s", "50s", "60s", "70s", "80s", "early 20s", "mid 20s", "late 20s", "early 30s", "mid 30s", "late 30s", "early 40s", "mid 40s", "late 40s", "early 50s", "mid 50s", "late 50s", "early 60s", "mid 60s", "late 60s", "early 70s", "mid 70s", "late 70s", "early 80s", "prime", "golden years", "roaring 20s", "dirty 30s", "fabulous 40s", "nifty 50s"],
                    
                    // Reel 1: Size
                    ["silver fox", "papa bear", "lumberjack", "tech bro", "gym bro", "couch potato", "grill master", "handyman", "scholar", "silverback", "gentle giant", "tiny king", "average joe", "big kahuna", "lone wolf", "lumberjack build", "dad-bod supreme", "lean marathoner", "barrel-chested brute", "compact king", "grizzled veteran", "hulking bruiser", "wiry scrapper", "broad-shouldered boss"],
                    
                    // Reel 2: Personality
                    generateRandomPersonalities(40),
                    
                    // Reel 3: Clothing
                    ["cargo shorts and a polo", "a sharp three-piece suit", "flannel and jeans", "a tucked-in golf shirt and slacks", "baggy sweatpants and a hoodie", "a loud Hawaiian shirt", "a matching velour tracksuit", "a leather jacket and ripped jeans", "matching flannel pajamas", "denim overalls", "a classic trench coat", "basketball shorts and a tank top", "a sharp blazer", "a black turtleneck", "pleated khakis", "a neon retro ski suit", "a vintage band tee", "a preppy sweater vest"],
                    
                    // Reel 4: Accessory
                    ["white New Balances", "a pristine pair of grilling tongs", "aviator sunglasses", "a fancy smartwatch", "a vintage leather briefcase", "a baseball cap from a hardware store", "a massive key ring", "a golf glove in his back pocket", "a very specific brand of sunglasses", "a leather tool belt", "a freshly polished golf club", "a ridiculously expensive cooler", "a 'World's Greatest Dad' mug", "a perfectly seasoned cast iron pan", "a massive, complicated keychain", "a bluetooth earpiece from 2008"],
                    
                    // Reel 5: Hobby
                    ["explaining World War 2 history to strangers", "smoking various meats for 14 hours", "fixing things that aren't actually broken", "falling asleep in his favorite recliner", "brewing overly-hoppy craft beer in the garage", "mowing the lawn with suspicious enthusiasm", "adjusting the thermostat by one degree", "watching 8-hour documentaries on ancient Rome", "collecting rare vintage guitars", "tinkering with a classic car that never runs", "coaching Little League aggressively", "building complicated model trains", "researching obscure investment strategies", "maintaining a pristine sneaker collection", "golfing every single weekend"]
                ]
            }
        };

        let currentMode = 'MILF';
        let isSpinning = false;
        const itemHeight = 100; // Height of reel item in CSS
        const spinMultiplier = 4; // Length of the spin runway

        const titleEl = document.getElementById('main-title');
        const toggleEl = document.getElementById('mode-toggle');
        const labelMilf = document.getElementById('label-milf');
        const labelDilf = document.getElementById('label-dilf');
        const mobileSpinBtn = document.getElementById('mobile-spin-btn');
        const outputContainer = document.getElementById('output-container');
        const outputSentence = document.getElementById('output-sentence');
        const paylines = document.querySelectorAll('.payline');
        const reelContainers = [
            document.getElementById('reel-0'), document.getElementById('reel-1'),
            document.getElementById('reel-2'), document.getElementById('reel-3'),
            document.getElementById('reel-4'), document.getElementById('reel-5')
        ];

        // Three.js State
        let leverBallMat, leverStickPivot;
        const RESTING_ROTATION = -0.35; // Leans slightly back like a real machine
        const PULLED_ROTATION = 1.8;   // Pulls all the way down past 90 degrees
        let targetLeverRotation = RESTING_ROTATION;
        let leverRotation = RESTING_ROTATION;
        let leverVelocity = 0;
        let isHoldingLever = false;

        function initMachine() {
            const data = gameData[currentMode];
            
            // Update Title & Theme Colors
            titleEl.textContent = data.title;
            titleEl.className = `title-font text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r ${data.colors[0]} ${data.colors[1]} drop-shadow-lg transition-all duration-500`;
            mobileSpinBtn.className = `sm:hidden w-full mt-6 bg-gradient-to-b ${data.colors[0]} ${data.colors[1]} text-white font-bold text-xl py-4 rounded-xl border-b-4 ${data.colors[3]} active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest title-font shadow-lg`;
            
            paylines.forEach(line => {
                line.className = `payline absolute top-1/2 left-0 right-0 h-[3px] -translate-y-1/2 z-20 pointer-events-none transition-colors duration-400 ${data.colors[2]} shadow-[0_0_8px_${data.colors[4]}]`;
            });

            // Update 3D Ball Color
            if (leverBallMat) {
                if (currentMode === 'MILF') {
                    leverBallMat.color.setHex(0xff4444);
                } else {
                    leverBallMat.color.setHex(0x4444ff);
                }
            }

            // Update Toggle text colors
            if (currentMode === 'MILF') {
                labelMilf.classList.replace('text-gray-500', 'text-red-400');
                labelDilf.classList.replace('text-blue-400', 'text-gray-500');
            } else {
                labelMilf.classList.replace('text-red-400', 'text-gray-500');
                labelDilf.classList.replace('text-gray-500', 'text-blue-400');
            }

            // Build Reels
            reelContainers.forEach((container, index) => {
                container.innerHTML = '';
                container.style.transition = 'none';
                container.style.transform = `translateY(0px)`;
                
                const items = data.reels[index];
                const startIndex = Math.floor(Math.random() * items.length);
                let html = '';
                
                // Construct the spin runway by copying array multiple times
                const fullList = [];
                for(let i=0; i<spinMultiplier; i++) {
                    fullList.push(...shuffleArray([...items]));
                }
                const finalItems = shuffleArray([...items]);
                fullList.push(...finalItems);

                fullList.forEach(text => {
                    // Safe injection of text into DOM
                    html += `<div class="reel-item" data-text="${text.replace(/"/g, '&quot;')}">${text}</div>`;
                });
                
                container.innerHTML = html;
                container.style.transform = `translateY(-${startIndex * itemHeight}px)`;
            });

            // Reset Output Box
            outputSentence.innerHTML = '<p class="opacity-50 italic text-center py-8">Pull the lever to generate your character...</p>';
            outputContainer.style.opacity = '1';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function handleSpin() {
            if (isSpinning) return;
            isSpinning = true;
            
            outputContainer.style.opacity = '0.3';
            const data = gameData[currentMode];
            let results = [];
            let completedReels = 0;

            reelContainers.forEach((container, i) => {
                const itemsCount = data.reels[i].length;
                const targetFinalIndex = Math.floor(Math.random() * itemsCount);
                const totalItemsInDOM = (itemsCount * spinMultiplier) + itemsCount;
                const stopIndex = totalItemsInDOM - itemsCount + targetFinalIndex;
                
                // Stagger stop times slightly per reel
                const duration = 2 + (i * 0.4); 
                
                container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.1, 1)`;
                container.style.transform = `translateY(-${stopIndex * itemHeight}px)`;

                setTimeout(() => {
                    results[i] = container.children[stopIndex].dataset.text;
                    completedReels++;

                    if (completedReels === reelContainers.length) {
                        finishSpin(results);
                    }
                }, duration * 1000);
            });
        }

        function finishSpin(results) {
            isSpinning = false;
            const data = gameData[currentMode];
            const c = data.colors[5]; 
            const capTarget = currentMode === 'MILF' ? 'Mother' : 'Dad';
            
            const randomAcronym = lfAcronyms[Math.floor(Math.random() * lfAcronyms.length)];

            // Ensures proper grammatical flow by dynamically adjusting the preposition for Age
            const ageText = results[0];
            const isEra = ageText.includes("prime") || ageText.includes("years") || ageText.includes("era");
            const agePreposition = isEra ? "during their" : "in their";

            const sentenceHtml = `
                <div class="space-y-2">
                    <p class="text-base md:text-lg leading-snug">
                        This <span class="font-bold ${c}">${data.noun}</span> is a <span class="font-bold ${c}">${results[1]}</span> ${agePreposition} <span class="font-bold ${c}">${ageText}</span>. 
                        They're known for being <span class="font-bold ${c}">${results[2]}</span>. 
                        You can usually find them wearing <span class="font-bold ${c}">${results[3]}</span> paired with <span class="font-bold ${c}">${results[4]}</span> while <span class="font-bold ${c}">${results[5]}</span>.
                    </p>
                    <div class="mt-3 pt-3 border-t border-white/20">
                        <p class="text-xl md:text-2xl font-black ${c} text-center tracking-widest uppercase drop-shadow-md">
                            ${capTarget} I'd <span class="underline decoration-4 underline-offset-4">${randomAcronym}!</span>
                        </p>
                    </div>
                </div>
            `;

            outputSentence.innerHTML = sentenceHtml;
            outputContainer.style.opacity = '1';
        }

        function initThreeJSLever() {
            const container = document.getElementById('three-lever-container');
            if(!container) return;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Dynamic Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            const leverGroup = new THREE.Group();
            scene.add(leverGroup);

            // Metal Base (Made chunkier)
            const baseGeo = new THREE.BoxGeometry(2, 6, 3);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.set(0, -2, 0);
            leverGroup.add(base);

            // Lever Pivot point
            leverStickPivot = new THREE.Group();
            leverStickPivot.position.set(0, -0.5, 0);
            leverGroup.add(leverStickPivot);

            // Metal Stick (Thicker and longer)
            const stickGeo = new THREE.CylinderGeometry(0.4, 0.4, 7);
            const stickMat = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.9, roughness: 0.1 });
            const stick = new THREE.Mesh(stickGeo, stickMat);
            stick.position.set(0, 3.5, 0);
            leverStickPivot.add(stick);

            // Glossy Interactive Ball (Bigger)
            const ballGeo = new THREE.SphereGeometry(1.4, 32, 32);
            leverBallMat = new THREE.MeshStandardMaterial({ color: 0xff4444, metalness: 0.3, roughness: 0.1 });
            const ball = new THREE.Mesh(ballGeo, leverBallMat);
            ball.position.set(0, 7.5, 0);
            leverStickPivot.add(ball);

            // Set Initial Resting Position
            leverStickPivot.rotation.x = RESTING_ROTATION;

            // Adjusted Camera to fit larger lever
            camera.position.z = 22; 
            camera.position.x = -4; // Shifted to see side profile
            camera.position.y = 3; 
            camera.lookAt(0, 1, 0);

            // True Spring Physics Render Loop
            function animate() {
                requestAnimationFrame(animate);
                
                const tension = 0.12; // Snap back force
                const dampening = 0.82; // Bounciness/friction
                
                leverVelocity += (targetLeverRotation - leverRotation) * tension;
                leverVelocity *= dampening;
                leverRotation += leverVelocity;

                if (leverStickPivot) {
                    leverStickPivot.rotation.x = leverRotation;
                }
                renderer.render(scene, camera);
            }
            animate();

            // Interactive Drag Physics
            container.addEventListener('mousedown', () => {
                if(isSpinning) return;
                isHoldingLever = true;
                targetLeverRotation = PULLED_ROTATION; 
            });

            window.addEventListener('mouseup', () => {
                if (isHoldingLever) {
                    isHoldingLever = false;
                    targetLeverRotation = RESTING_ROTATION; 
                    handleSpin();
                }
            });

            // Touch support
            container.addEventListener('touchstart', (e) => {
                if(isSpinning) return;
                e.preventDefault();
                isHoldingLever = true;
                targetLeverRotation = PULLED_ROTATION;
            }, {passive: false});

            window.addEventListener('touchend', () => {
                if (isHoldingLever) {
                    isHoldingLever = false;
                    targetLeverRotation = RESTING_ROTATION;
                    handleSpin();
                }
            });
        }

        // Mode Toggle Listener
        toggleEl.addEventListener('change', (e) => {
            if(isSpinning) {
                e.preventDefault();
                toggleEl.checked = !toggleEl.checked;
                return;
            }
            currentMode = toggleEl.checked ? 'DILF' : 'MILF';
            initMachine();
        });

        // Mobile Spin Hook
        mobileSpinBtn.addEventListener('click', () => {
            if(!isSpinning) {
                targetLeverRotation = PULLED_ROTATION;
                setTimeout(() => { targetLeverRotation = RESTING_ROTATION; handleSpin(); }, 150);
            }
        });

        // Initialize App
        window.onload = () => {
            initMachine();
            setTimeout(initThreeJSLever, 100); 
        };
    </script>
</body>
</html>
