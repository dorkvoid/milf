<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Character Machine</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            margin: 0;
            overflow-x: hidden;
            color: #f8fafc;
            min-height: 100vh;
        }

        .title-font {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 3px;
        }

        .machine-body {
            background: linear-gradient(145deg, #cbd5e1, #94a3b8);
            box-shadow: 
                inset 0px 5px 10px rgba(255,255,255,0.5),
                inset 0px -5px 15px rgba(0,0,0,0.3),
                0px 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .machine-screen {
            background: #ffffff;
            box-shadow: inset 0px 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .reel-row {
            position: relative;
            width: 100%;
        }

        .reel-row::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .reel-column {
            position: relative;
            overflow: hidden;
            height: 120px;
            flex: 1; 
        }

        .reel-inner {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .reel-item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: #1e293b;
            padding: 0 0.5rem;
            text-transform: uppercase;
            word-break: break-word;
        }

        /* Glassmorphism Adlib Box */
        .glassy-output {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: opacity 0.4s ease;
            min-height: 320px; /* Increased to hold the final text without expanding */
            display: flex; /* Centers the default placeholder text beautifully */
            flex-direction: column;
            justify-content: center;
            color: #f8fafc;
        }

        /* 3D Canvas Container */
        #three-lever-container {
            position: absolute;
            right: -100px;
            top: 50%;
            transform: translateY(-50%);
            width: 140px; /* Widened the invisible canvas to prevent clipping */
            height: 320px; /* Taller canvas for a smooth swing */
            z-index: 20;
            cursor: grab;
        }

        #three-lever-container:active {
            cursor: grabbing;
        }

        /* Adjusted breakpoints so the lever stays visible in the split-screen preview! */
        @media (max-width: 850px) {
            #three-lever-container { 
                right: -40px;
                transform: translateY(-50%) scale(0.7); /* Scale it down to fit smaller screens */
            }
            .reel-item { font-size: 0.75rem; padding: 0 0.25rem; }
        }

        @media (max-width: 640px) {
            #three-lever-container { display: none; } /* Only hide on actual mobile phones */
            .reel-item { font-size: 0.65rem; padding: 0 0.15rem; }
        }
    </style>

atches", "doing leatherworking", "studying local history", "watching incredibly loud action movies", "falling asleep during incredibly loud action movies", "reading the entire instruction manual before opening the box", "insisting on driving the scenic route", "giving unprompted financial advice", "spending three hours washing his car on a Sunday", "researching the best possible lawn fertilizer", "listening to very obscure jazz records", "buying entirely too much meat at Costco", "building entirely unnecessary shelves in the garage", "watching golf on TV with his eyes closed", "perfecting his chili recipe", "collecting different types of hot sauce", "arguing with the GPS", "refusing to ask for directions", "wearing a headlamp to fix minor household issues", "buying specialized tools he will use exactly once", "getting extremely competitive at family board game night", "telling you the exact mileage he gets on the highway", "complaining about the music they play in stores now", "watching Youtube videos of people power washing driveways"]

        let currentMode = 'MILF';

        const spinMultiplier = 4; // Length of the spin runway

        const titleEl = document.getElementById('main-title');
        const toggleEl = document.getElementById('mode-toggle');
        const labelMilf = document.getElementById('label-milf');
        const labelDilf = document.getElementById('label-dilf');
        const mobileSpinBtn = document.getElementById('mobile-spin-btn');
        const outputContainer = document.getElementById('output-container');
        const outputSentence = document.getElementById('output-sentence');
        const paylines = document.querySelectorAll('.payline');
        const reelContainers = [
            document.getElementById('reel-0'), document.getElementById('reel-1'),
            document.getElementById('reel-2'), document.getElementById('reel-3'),
            document.getElementById('reel-4'), document.getElementById('reel-5')
        ];

        // Three.js State
        let leverBallMat, leverStickPivot;
        let targetLeverRotation = 0;
        let leverRotation = 0;
        let leverVelocity = 0;
        let isHoldingLever = false;

        function initMachine() {
            const data = gameData[currentMode];
            
            // Update Title & Theme Colors
            titleEl.textContent = data.title;
            titleEl.className = `title-font text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r ${data.colors[0]} ${data.colors[1]} drop-shadow-lg transition-all duration-500`;
            mobileSpinBtn.className = `sm:hidden w-full mt-6 bg-gradient-to-b ${data.colors[0]} ${data.colors[1]} text-white font-bold text-xl py-4 rounded-xl border-b-4 ${data.colors[3]} active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest title-font shadow-lg`;
            
            paylines.forEach(line => {
                line.className = `payline absolute top-1/2 left-0 right-0 h-[3px] -translate-y-1/2 z-20 pointer-events-none transition-colors duration-400 ${data.colors[2]} shadow-[0_0_8px_${data.colors[4]}]`;
            });

            // Update 3D Ball Color
            if (leverBallMat) {
                if (currentMode === 'MILF') {
                    leverBallMat.color.setHex(0xff4444);

                }

            if (currentMode === 'MILF') {
                labelMilf.classList.replace('text-gray-500', 'text-red-400');
                labelDilf.classList.replace('text-blue-400', 'text-gray-500');
            } else {
                labelMilf.classList.replace('text-red-400', 'text-gray-500');
                labelDilf.classList.replace('text-gray-500', 'text-blue-400');
            }

            reelContainers.forEach((container, index) => {
                container.innerHTML = '';
                container.style.transition = 'none';
                container.style.transform = `translateY(0px)`;
                
                const items = data.reels[index];
                const startIndex = Math.floor(Math.random() * items.length);
                let html = '';
                
                // Construct the spin runway by copying array multiple times
                const fullList = [];
                for(let i=0; i<spinMultiplier; i++) {
                    fullList.push(...shuffleArray([...items]));
                }
                const finalItems = shuffleArray([...items]);
                fullList.push(...finalItems);

                fullList.forEach(text => {
                    // Safe injection of text into DOM
                    html += `<div class="reel-item" data-text="${text.replace(/"/g, '&quot;')}">${text}</div>`;
                });
                
                container.innerHTML = html;
                container.style.transform = `translateY(-${startIndex * itemHeight}px)`;
            });

            // Reset Output Box
            outputSentence.innerHTML = '<p class="opacity-50 italic text-center py-8">Pull the lever to generate your character...</p>';
            outputContainer.style.opacity = '1';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function handleSpin() {
            if (isSpinning) return;
            isSpinning = true;
            
            outputContainer.style.opacity = '0.3';
            const data = gameData[currentMode];
            let results = [];
            let completedReels = 0;

            reelContainers.forEach((container, i) => {
                const itemsCount = data.reels[i].length;
                const targetFinalIndex = Math.floor(Math.random() * itemsCount);
                const totalItemsInDOM = (itemsCount * spinMultiplier) + itemsCount;
                const stopIndex = totalItemsInDOM - itemsCount + targetFinalIndex;
                
                // Stagger stop times slightly per reel
                const duration = 2 + (i * 0.4); 
                
                container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.1, 1)`;
                container.style.transform = `translateY(-${stopIndex * itemHeight}px)`;

                setTimeout(() => {
                    results[i] = container.children[stopIndex].dataset.text;
                    completedReels++;

                    if (completedReels === reelContainers.length) {
                        finishSpin(results);
                    }
                }, duration * 1000);
            });
        }

        function finishSpin(results) {
            isSpinning = false;
            const data = gameData[currentMode];
            const c = data.colors[5]; // Uses text-red-400 or text-blue-400
            const capTarget = currentMode === 'MILF' ? 'Mother' : 'Dad';

                    <p class="text-xl md:text-2xl leading-relaxed">

                        They're known for being <span class="font-bold ${c}">${results[2]}</span>. 
                        You can usually find them wearing <span class="font-bold ${c}">${results[3]}</span> paired with <span class="font-bold ${c}">${results[4]}</span> while <span class="font-bold ${c}">${results[5]}</span>.
                    </p>
                    <div class="mt-6 pt-6 border-t border-white/20">
                        <p class="text-3xl md:text-4xl font-black ${c} text-center tracking-widest uppercase drop-shadow-md">
                            ${capTarget} I'd <br class="md:hidden"/><span class="underline decoration-4 underline-offset-4">${randomAcronym}!</span>
                        </p>
                    </div>
                </div>
            `;

            outputSentence.innerHTML = sentenceHtml;
            outputContainer.style.opacity = '1';
        }

        function initThreeJSLever() {
            const container = document.getElementById('three-lever-container');
            if(!container) return;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Dynamic Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            const leverGroup = new THREE.Group();
            scene.add(leverGroup);

            // Metal Base
            const baseGeo = new THREE.BoxGeometry(1.5, 5, 2);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.set(0, -2, 0);
            leverGroup.add(base);

            // Lever Pivot point
            leverStickPivot = new THREE.Group();
            leverStickPivot.position.set(0, -1, 0);
            leverGroup.add(leverStickPivot);

            // Metal Stick
            const stickGeo = new THREE.CylinderGeometry(0.3, 0.3, 6);
            const stickMat = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.9, roughness: 0.1 });
            const stick = new THREE.Mesh(stickGeo, stickMat);
            stick.position.set(0, 3, 0);
            leverStickPivot.add(stick);

            // Glossy Interactive Ball
            const ballGeo = new THREE.SphereGeometry(1.2, 32, 32);
            leverBallMat = new THREE.MeshStandardMaterial({ color: 0xff4444, metalness: 0.3, roughness: 0.1 });
            const ball = new THREE.Mesh(ballGeo, leverBallMat);
            ball.position.set(0, 6.5, 0);
            leverStickPivot.add(ball);

            camera.position.z = 18; // Pulled the camera back slightly to keep the ball in frame
            camera.position.x = -2;
            camera.position.y = 2; // Shifted up slightly to center the animation
            camera.lookAt(0, 1, 0);

            // True Spring Physics Render Loop
            function animate() {
                requestAnimationFrame(animate);
                
                const tension = 0.12; // Snap back force
                const dampening = 0.82; // Bounciness/friction
                
                leverVelocity += (targetLeverRotation - leverRotation) * tension;
                leverVelocity *= dampening;
                leverRotation += leverVelocity;

                if (leverStickPivot) {
                    leverStickPivot.rotation.x = leverRotation;
                }
                renderer.render(scene, camera);
            }
            animate();

            // Interactive Drag Physics
            container.addEventListener('mousedown', () => {
                if(isSpinning) return;
                isHoldingLever = true;
                targetLeverRotation = Math.PI / 2.5; 
            });

            window.addEventListener('mouseup', () => {
                if (isHoldingLever) {
                    isHoldingLever = false;
                    targetLeverRotation = 0; 
                    handleSpin();
                }
            });

            // Touch support
            container.addEventListener('touchstart', (e) => {
                if(isSpinning) return;
                e.preventDefault();
                isHoldingLever = true;
                targetLeverRotation = Math.PI / 2.5;
            }, {passive: false});

            window.addEventListener('touchend', () => {
                if (isHoldingLever) {
                    isHoldingLever = false;
                    targetLeverRotation = 0;
                    handleSpin();
                }
            });
        }

        // Mode Toggle Listener
        toggleEl.addEventListener('change', (e) => {
            if(isSpinning) {
                e.preventDefault();
                toggleEl.checked = !toggleEl.checked;
                return;
            }
            currentMode = toggleEl.checked ? 'DILF' : 'MILF';
            initMachine();
        });

        // Mobile Spin Hook
        mobileSpinBtn.addEventListener('click', () => {
            if(!isSpinning) {
                targetLeverRotation = Math.PI / 2.5;
                setTimeout(() => { targetLeverRotation = 0; handleSpin(); }, 150);
            }
        });

        // Initialize App
        window.onload = () => {
            initMachine();
            setTimeout(initThreeJSLever, 100); 
        };
