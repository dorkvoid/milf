<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Milf Machine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: #f8fafc;
        }

        .title-font {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 3px;
        }

        .machine-body {
            background: linear-gradient(145deg, #cbd5e1, #94a3b8);
            box-shadow: 
                inset 0px 5px 10px rgba(255,255,255,0.5),
                inset 0px -5px 15px rgba(0,0,0,0.3),
                0px 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .machine-screen {
            background: #ffffff;
            box-shadow: inset 0px 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .reel-row {
            position: relative;
            width: 100%;
        }

        .reel-row::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .reel-column {
            position: relative;
            overflow: hidden;
            height: 80px;
            flex: 1;
        }

        .reel-inner {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .reel-item {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.75rem;
            color: #1e293b;
            padding: 0 0.5rem;
            text-transform: uppercase;
            word-break: break-word;
            line-height: 1.1;
        }

        .glass-output {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            height: 280px;
            transition: opacity 0.5s ease;
        }

        #three-switch-container {
            position: absolute;
            left: -120px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px; 
            height: 220px; 
            z-index: 20;
            cursor: pointer;
        }

        #three-button-container {
            position: absolute;
            right: -320px;
            top: -20px;
            bottom: -500px;
            width: 380px; 
            z-index: 20;
            cursor: pointer;
        }

        #three-button-container:active, #three-switch-container:active {
            cursor: grabbing;
        }

        @media (max-width: 1024px) {
            #three-switch-container { left: -90px; transform: translateY(-50%) scale(0.8); }
            #three-button-container { right: -240px; top: -20px; bottom: -400px; transform: scale(0.8); transform-origin: top right; }
        }
        @media (max-width: 850px) {
            #three-switch-container { left: -60px; transform: translateY(-50%) scale(0.7); }
            #three-button-container { right: -150px; top: -20px; bottom: -300px; transform: scale(0.7); transform-origin: top right; }
            .reel-item { font-size: 0.75rem; }
        }
        @media (max-width: 640px) {
            #three-switch-container { left: -30px; transform: translateY(-50%) scale(0.45); }
            #three-button-container { right: -80px; top: -20px; bottom: -200px; transform: scale(0.45); transform-origin: top right; }
            .reel-item { font-size: 0.65rem; padding: 0 0.2rem; }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-2 md:p-4 box-border">

    <div class="w-full max-w-4xl flex flex-col items-center gap-4 relative">
        
        <!-- Header -->
        <div class="flex flex-col items-center gap-2 text-center w-full min-h-[60px]">

                THE M.I.L.F. MACHINE
            </h1>
        </div>

        <!-- Slot Machine Wrapper -->
        <div class="relative w-full max-w-3xl mt-2">
            
            <!-- 3D Switch Container (Left) -->
            <div id="three-switch-container" class="flex flex-col items-center justify-center">

                <span id="switch-label-dilf" class="font-bold text-2xl tracking-widest text-gray-500 transition-colors duration-300 absolute -bottom-8 z-10 drop-shadow-md">DILF</span>
            </div>

            <!-- Machine Body -->
            <div class="machine-body rounded-3xl p-3 md:p-6 border-4 border-gray-500 z-10 relative">
                <div class="machine-screen rounded-xl border-8 border-gray-800 flex flex-col relative overflow-hidden bg-white">
                    
                    <!-- Top Row of Reels -->
                    <div class="reel-row flex relative border-b-4 border-gray-800">
                        <div class="payline absolute top-1/2 left-0 right-0 h-[3px] -translate-y-1/2 z-20 pointer-events-none transition-colors duration-400 bg-red-500/60 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-0"></div></div>
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-1"></div></div>
                        <div class="reel-column"><div class="reel-inner" id="reel-2"></div></div>
                    </div>

                    <!-- Bottom Row of Reels -->
                    <div class="reel-row flex relative">
                        <div class="payline absolute top-1/2 left-0 right-0 h-[3px] -translate-y-1/2 z-20 pointer-events-none transition-colors duration-400 bg-red-500/60 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-3"></div></div>
                        <div class="reel-column border-r-2 border-gray-200"><div class="reel-inner" id="reel-4"></div></div>
                        <div class="reel-column"><div class="reel-inner" id="reel-5"></div></div>
                    </div>
                </div>
            </div>

            <!-- Mobile Spin Button -->
            <button id="mobile-spin-btn" class="md:hidden w-full mt-4 bg-gradient-to-b from-red-400 to-red-600 text-white font-bold text-xl py-3 rounded-xl border-b-4 border-red-900 active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest title-font shadow-lg">
                Pull Lever!
            </button>

            <!-- 3D Arcade Button Container (Right) -->
            <div id="three-button-container"></div>
        </div>

        <div class="w-full max-w-2xl mt-6 relative z-10">
            <div class="glass-output rounded-2xl p-6 md:p-8 flex flex-col justify-center relative overflow-hidden" id="output-container">
                <div id="output-accent" class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-red-400 to-red-600 transition-colors duration-500"></div>
                <div id="output-sentence" class="text-lg md:text-xl text-gray-100 font-semibold leading-relaxed pl-4">
                    <p class="opacity-50 italic text-center font-normal">Push the button to generate your character...</p>
                </div>
            </div>
        </div>
    </div>

    <script>

        const milfClothing = ["a sports bra and a long skirt", "a tailored pantsuit", "yoga pants and an oversized tee", "a vintage floral dress", "high-waisted mom jeans and a cozy sweater", "a breezy yellow sundress", "a matching velour tracksuit", "a leather jacket and ripped jeans", "Lululemon leggings and a giant Stanley cup", "a massive messy bun and an exhausted expression", "a silk slip dress", "cargo pants and a crop top", "a sparkly evening gown", "an oversized college hoodie and sweatpants", "a sharply tailored blazer and pencil skirt", "a boho-chic maxi skirt and peasant blouse", "a tactical turtleneck", "a brightly colored retro windbreaker", "a gothic lace corset and skirt", "a completely denim tuxedo"];

        const dilfSizes = ["silver fox", "papa bear", "lumberjack", "tech bro", "gym bro", "couch potato", "grill master", "handyman", "scholar", "silverback", "gentle giant", "tiny king", "average joe", "big kahuna", "dad-bod supreme", "lean marathoner", "barrel-chested brute", "compact king", "grizzled veteran", "mountain of a man", "lanky beanpole", "absolute unit", "stout bulldog", "majestic stallion", "tired golden retriever", "lone wolf", "ferocious grizzly", "sturdy brick wall"];
        const dilfAges = ["20s", "30s", "40s", "50s", "60s", "70s", "80s", "90s", "distinguished 60s", "rugged 40s", "newly-divorced 30s", "timeless era", "absolute prime", "silver-haired 50s", "grizzled 70s", "youthful 40s", "stately 80s", "mid-life crisis", "early retirement", "golden years", "prime 30s", "experienced 50s", "ancient era", "immortal phase", "ageless wonder"];
        const dilfPersonalities = ["stoic, quiet, and highly observant", "warm, loving, and fiercely protective", "goofy, silly, and always cracking dad jokes", "grumpy, tired, and running on black coffee", "handy, helpful, and always fixing things", "bold, brash, and unapologetic", "organized, uptight, and highly driven", "grumpy, quiet, and hyper-competent", "corny, loud, and completely immune to embarrassment", "stoic, protective, and secretly soft", "obsessed with the thermostat and lawn care", "intense, focused, and slightly intimidating", "relaxed, chill, and wonderfully breezy", "clueless, sweet, and trying his absolute best", "hyper-competitive, loud, and a sore loser", "intellectual, pretentious, and smoking a pipe", "paranoid, prepared, and ready for the apocalypse", "nostalgic, emotional, and crying at car commercials", "slick, charming, and slightly untrustworthy"];
        const dilfClothing = ["cargo shorts and a tucked-in polo", "a sharp three-piece suit", "flannel and faded jeans", "a tucked-in golf shirt and slacks", "baggy sweatpants and a stained hoodie", "a loud Hawaiian shirt and board shorts", "a Patagonia vest over a plaid shirt", "an old band tee and perfectly worn jeans", "a slightly stained 'Kiss The Cook' grilling apron", "a matching velour tracksuit", "a leather jacket and dark denim", "a crisp button-down and khakis", "a multi-pocket fishing vest", "a full cycling spandex kit", "a massive winter parka regardless of the weather", "a tweed professor jacket with elbow patches", "a perfectly tailored tuxedo", "a vintage football jersey", "a grease-stained mechanic's jumpsuit"];
        const dilfAccessories = ["crisp white New Balances", "polished oxfords", "scuffed steel-toed boots", "grass-stained cleats", "fuzzy socks with sandals", "leather flip-flops", "chunky orthopedic sneakers", "heavy motorcycle boots", "a massive, complicated smartwatch", "a bluetooth earpiece from 2008", "aviator sunglasses", "a heavily loaded toolbelt", "a personalized golf glove", "a bulky money clip", "a perfectly seasoned cast iron skillet", "a set of jumper cables", "a ridiculously bright tactical flashlight", "a pair of binoculars", "a high-end meat thermometer"];
        const dilfHobbies = ["explaining World War 2 history to strangers", "smoking various meats for 14 hours", "fixing things that aren't actually broken", "falling asleep in his favorite recliner", "brewing overly-hoppy craft beer in the garage", "mowing the lawn with terrifying geometric precision", "giving unsolicited driving directions", "tinkering with a classic car", "coaching Little League far too aggressively", "watching golf with his eyes closed", "building an unnecessary deck", "investing in extremely volatile crypto", "collecting rare and expensive bourbons", "cleaning the gutters every single weekend", "arguing with the GPS", "buying tools he will only use once", "guarding the thermostat with his life"];
        const dilfAcronyms = ["Love to Finance!", "Listen to Forever!", "Live For!", "Look For!", "Love Fiercely!", "Leave Flowers for!", "Lend Funds to!", "Learn From!", "Launch Fireworks for!", "Locate First!", "Lend Favors to!", "Laugh with Forever!", "Leave a Fortune to!", "Let Fix things!", "Listen to Facts from!", "Learn to Forgive!", "Look at Fondly!", "Loan my Ferrari to!", "Lose Focus over!", "Line up For!", "Let Fix the sink!", "Look Forward to!", "Learn Finance from!", "Leave the Foundation to!", "Light Fires with!", "Load Freight with!", "Lift Furniture with!", "Lend my Fishing rod to!", "Learn Farming from!", "Leave the Finances to!", "Let Flip the burgers!", "Lay Flooring with!"];

        const gameData = {
            MILF: {
                title: "THE M.I.L.F. MACHINE",
                noun: "mother",
                colors: ["from-red-400", "to-red-600", "rgba(239, 68, 68, 0.6)", "border-red-900"],
                paylineClass: "bg-red-500/60 shadow-[0_0_8px_rgba(239,68,68,0.8)]",
                reels: [milfAges, milfSizes, milfPersonalities, milfClothing, milfAccessories, milfHobbies],
                acronyms: milfAcronyms
            },
            DILF: {
                title: "THE D.I.L.F. DEVICE",
                noun: "father",
                colors: ["from-blue-400", "to-blue-600", "rgba(59, 130, 246, 0.6)", "border-blue-900"],
                paylineClass: "bg-blue-500/60 shadow-[0_0_8px_rgba(59,130,246,0.8)]",
                reels: [dilfAges, dilfSizes, dilfPersonalities, dilfClothing, dilfAccessories, dilfHobbies],
                acronyms: dilfAcronyms
            }
        };

        let currentMode = 'MILF';
        let isSpinning = false;
        const itemHeight = 80; 
        const spinMultiplier = 3; 

        const titleEl = document.getElementById('main-title');
        const toggleEl = document.getElementById('mode-toggle');
        const labelMilf = document.getElementById('label-milf');
        const switchLabelMilf = document.getElementById('switch-label-milf');
        const switchLabelDilf = document.getElementById('switch-label-dilf');
        const outputSentence = document.getElementById('output-sentence');
        const outputAccent = document.getElementById('output-accent');
        const mobileSpinBtn = document.getElementById('mobile-spin-btn');
        const paylines = document.querySelectorAll('.payline');
        const reelContainers = [
            document.getElementById('reel-0'), document.getElementById('reel-1'), 
            document.getElementById('reel-2'), document.getElementById('reel-3'), 
            document.getElementById('reel-4'), document.getElementById('reel-5')
        ];

        function initMachine() {
            const data = gameData[currentMode];
            
            // Update Title & Theme Colors
            titleEl.textContent = data.title;
            titleEl.className = `title-font text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r ${data.colors[0]} ${data.colors[1]} drop-shadow-lg transition-all duration-500`;
            mobileSpinBtn.className = `md:hidden w-full mt-4 bg-gradient-to-b ${data.colors[0]} ${data.colors[1]} text-white font-bold text-xl py-3 rounded-xl border-b-4 ${data.colors[3]} active:border-b-0 active:translate-y-1 transition-all uppercase tracking-widest title-font shadow-lg`;
            outputAccent.className = `absolute top-0 left-0 w-2 h-full bg-gradient-to-b ${data.colors[0]} ${data.colors[1]} transition-colors duration-500`;
            
            paylines.forEach(line => {
                line.className = `payline absolute top-1/2 left-0 right-0 h-[3px] -translate-y-1/2 z-20 pointer-events-none transition-colors duration-400 ${data.paylineClass}`;
            });

            if (currentMode === 'MILF') {
                switchLabelMilf.classList.replace('text-gray-500', 'text-red-400');
                switchLabelDilf.classList.replace('text-blue-400', 'text-gray-500');
            } else {
                switchLabelMilf.classList.replace('text-red-400', 'text-gray-500');
                switchLabelDilf.classList.replace('text-gray-500', 'text-blue-400');
            }

            if (typeof spinButtonMesh !== 'undefined' && spinButtonMesh) spinButtonMesh.material.color.setHex(currentMode === 'MILF' ? 0xef4444 : 0x3b82f6);
            if (typeof switchToggleGroup !== 'undefined' && switchToggleGroup) targetSwitchRot = currentMode === 'MILF' ? SWITCH_MILF_ROT : SWITCH_DILF_ROT;

            reelContainers.forEach((container, index) => {
                container.innerHTML = '';
                container.style.transition = 'none';
                container.style.transform = `translateY(0px)`;
                
                const items = data.reels[index];
                const startIndex = Math.floor(Math.random() * items.length);
                let html = '';
                
                const fullList = [];
                for(let i=0; i<spinMultiplier; i++) {
                    fullList.push(...shuffleArray([...items]));
                }
                const finalItems = shuffleArray([...items]);
                fullList.push(...finalItems);

                fullList.forEach(text => {
                    html += `<div class="reel-item">${text}</div>`;
                });
                
                container.innerHTML = html;
                container.style.transform = `translateY(-${startIndex * itemHeight}px)`;
            });

            outputSentence.innerHTML = '<p class="opacity-50 italic text-center font-normal">Push the button to generate your character...</p>';
            document.getElementById('output-container').style.opacity = '1';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function handleSpin() {
            if (isSpinning) return;
            isSpinning = true;

            // Depress button Y
            targetButtonY = BUTTON_PRESSED_Y;
            
            setTimeout(() => {
                targetButtonY = BUTTON_RESTING_Y; 
                executeSpin();
            }, 150);
        }

        function executeSpin() {
            document.getElementById('output-container').style.opacity = '0.3';
            
            const data = gameData[currentMode];
            let results = [];
            let completedReels = 0;

            reelContainers.forEach((container, i) => {
                const itemsCount = data.reels[i].length;
                const targetFinalIndex = Math.floor(Math.random() * itemsCount);
                const totalItemsInDOM = (itemsCount * spinMultiplier) + itemsCount;
                const stopIndex = totalItemsInDOM - itemsCount + targetFinalIndex;
                
                const duration = 1.5 + (i * 0.4); 
                
                container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.1, 1)`;
                container.style.transform = `translateY(-${stopIndex * itemHeight}px)`;

                setTimeout(() => {
                    results[i] = container.children[stopIndex].innerText;
                    completedReels++;

                    if (completedReels === reelContainers.length) {
                        finishSpin(results);
                    }
                }, duration * 1000);
            });
        }

        function finishSpin(results) {
            isSpinning = false;
            const data = gameData[currentMode];
            
            const hl = `font-bold text-transparent bg-clip-text bg-gradient-to-r ${data.colors[0]} ${data.colors[1]} drop-shadow-sm`;
            const traitClass = "font-bold text-white tracking-wide";
            const acronymStart = currentMode === 'MILF' ? "Mom I'd" : "Dad I'd";

            const sentenceHtml = `
                <p class="mb-1 text-sm md:text-base">This ${data.noun} is a <span class="${traitClass}">${results[1]}</span> in their <span class="${traitClass}">${results[0]}</span>.</p>
                <p class="mb-1 text-sm md:text-base">They're known for being <span class="${traitClass}">${results[2]}</span>.</p>
                <p class="mb-2 text-sm md:text-base">You can usually find them wearing <span class="${traitClass}">${results[3]}</span> paired with <span class="${traitClass}">${results[4]}</span> while <span class="${traitClass}">${results[5]}</span>.</p>
                <div class="text-center mt-3 flex items-center justify-center flex-wrap gap-x-1">
                    <span class="text-gray-300 italic font-medium text-lg md:text-xl">"Now that is a</span>
                    <span class="title-font tracking-widest text-2xl md:text-3xl ${hl} align-middle">${acronymStart} ${results[6]}!"</span>
                </div>
            `;

            outputSentence.innerHTML = sentenceHtml;
            document.getElementById('output-container').style.opacity = '1';
        }

        let rendererBtn, sceneBtn, cameraBtn;
        let buttonGroup, spinButtonMesh;
        const BUTTON_RESTING_Y = 3.8;
        const BUTTON_PRESSED_Y = 1.2;
        let targetButtonY = BUTTON_RESTING_Y;
        let buttonVelocity = 0;
        let isHolding = false;

        function initThreeButton() {
            const container = document.getElementById('three-button-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            sceneBtn = new THREE.Scene();
            cameraBtn = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
            cameraBtn.position.set(0, 12, 45); // Lowered and pulled back to face straight-on
            cameraBtn.lookAt(0, 5, 0);

            rendererBtn = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererBtn.setSize(width, height);
            container.appendChild(rendererBtn.domElement);

            // Softer, more natural lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            sceneBtn.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 8);
            sceneBtn.add(dirLight);
            
            const spotLight = new THREE.SpotLight(0xffffff, 1.2); // Halved the brightness
            spotLight.position.set(-5, 15, 10);
            spotLight.lookAt(0, 3, 0);
            spotLight.angle = Math.PI / 5;
            spotLight.penumbra = 0.6;
            sceneBtn.add(spotLight);

            buttonGroup = new THREE.Group();
            sceneBtn.add(buttonGroup);

            // The Long Pillar (Larger Base)
            const baseGeo = new THREE.CylinderGeometry(5.5, 5.5, 400.0, 64);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.4 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -198.0; 
            buttonGroup.add(base);

            // Glossy Black Bezel Ring
            const ringGeo = new THREE.TorusGeometry(4.2, 1.0, 32, 64);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.8 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 2.0;
            buttonGroup.add(ring);

            // High Gloss Arcade Button
            const btnGeo = new THREE.CylinderGeometry(3.0, 3.0, 4.0, 64);
            const initialColor = currentMode === 'MILF' ? 0xef4444 : 0x3b82f6;
            
            // Toned down reflection properties
            const buttonMat = new THREE.MeshPhysicalMaterial({ 
                color: initialColor, 
                metalness: 0.1, 
                roughness: 0.15, 
                clearcoat: 0.6, 
                clearcoatRoughness: 0.1,
                reflectivity: 0.5
            });
            
            spinButtonMesh = new THREE.Mesh(btnGeo, buttonMat);
            spinButtonMesh.position.y = BUTTON_RESTING_Y; 
            buttonGroup.add(spinButtonMesh);

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            rendererBtn.domElement.addEventListener('pointerdown', (e) => {
                if(isSpinning) return;
                const rect = rendererBtn.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, cameraBtn);
                
                const intersects = raycaster.intersectObject(buttonGroup, true);
                if (intersects.length > 0) {
                    isHolding = true;
                    targetButtonY = BUTTON_PRESSED_Y;
                }
            });

            const releaseButton = () => {
                if (isHolding) {
                    isHolding = false;
                    targetButtonY = BUTTON_RESTING_Y;
                    if (!isSpinning) {
                        isSpinning = true;
                        executeSpin();
                    }
                }
            };
            
            rendererBtn.domElement.addEventListener('pointerup', releaseButton);
            rendererBtn.domElement.addEventListener('pointerleave', releaseButton);
        }

        let rendererSw, sceneSw, cameraSw;
        let switchGroup, switchToggleGroup;
        const SWITCH_MILF_ROT = -0.55; 
        const SWITCH_DILF_ROT = 0.55;  
        let targetSwitchRot = SWITCH_MILF_ROT;

        function initThreeSwitch() {
            const container = document.getElementById('switch-canvas-holder');
            const width = container.clientWidth;
            const height = container.clientHeight;

            sceneSw = new THREE.Scene();
            cameraSw = new THREE.PerspectiveCamera(40, width / height, 0.1, 100);
            cameraSw.position.set(0, 0, 8); 
            cameraSw.lookAt(0, 0, 0);

            rendererSw = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererSw.setSize(width, height);
            container.appendChild(rendererSw.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            sceneSw.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(2, 5, 8);
            sceneSw.add(dirLight);

            switchGroup = new THREE.Group();
            sceneSw.add(switchGroup);

            // Metal Mounting Plate
            const plateGeo = new THREE.BoxGeometry(2.2, 4.0, 0.2);
            const plateMat = new THREE.MeshStandardMaterial({ color: 0x64748b, roughness: 0.6, metalness: 0.5 });
            const plate = new THREE.Mesh(plateGeo, plateMat);
            switchGroup.add(plate);

            // Threaded Metal Collar (Base of the toggle)
            const collarGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.4, 32);
            const collarMat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.4, metalness: 0.9 });
            const collar = new THREE.Mesh(collarGeo, collarMat);
            collar.rotation.x = Math.PI / 2;
            collar.position.z = 0.2;
            switchGroup.add(collar);

            // Switch Toggle Mechanism (The Lever Handle)
            switchToggleGroup = new THREE.Group();
            switchToggleGroup.position.z = 0.3; // Sit just inside the collar
            switchGroup.add(switchToggleGroup);

            // Long industrial rod
            const toggleGeo = new THREE.CylinderGeometry(0.15, 0.25, 2.0, 32);
            const toggleMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.3, metalness: 0.8 });
            const toggleMesh = new THREE.Mesh(toggleGeo, toggleMat);
            toggleMesh.rotation.x = Math.PI / 2; // Point it outward
            toggleMesh.position.z = 1.0; // extend out
            switchToggleGroup.add(toggleMesh);

            // Grip ball at the end of the lever
            const ballGeo = new THREE.SphereGeometry(0.35, 32, 32);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.2, metalness: 0.6 });
            const ballMesh = new THREE.Mesh(ballGeo, ballMat);
            ballMesh.position.y = 1.0; // Top of the cylinder
            toggleMesh.add(ballMesh);

            targetSwitchRot = currentMode === 'MILF' ? SWITCH_MILF_ROT : SWITCH_DILF_ROT;
            switchToggleGroup.rotation.x = targetSwitchRot;

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            rendererSw.domElement.addEventListener('pointerdown', (e) => {
                if(isSpinning) return;
                const rect = rendererSw.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, cameraSw);
                const intersects = raycaster.intersectObject(plate, true);
                if (intersects.length > 0) {
                    currentMode = currentMode === 'MILF' ? 'DILF' : 'MILF';
                    initMachine();
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (spinButtonMesh) {
                const displacement = targetButtonY - spinButtonMesh.position.y;
                buttonVelocity += displacement * 0.4;
                buttonVelocity *= 0.7;
                spinButtonMesh.position.y += buttonVelocity;
                rendererBtn.render(sceneBtn, cameraBtn);
            }

            if (switchToggleGroup) {
                switchToggleGroup.rotation.x += (targetSwitchRot - switchToggleGroup.rotation.x) * 0.2;
                rendererSw.render(sceneSw, cameraSw);
            }
        }

        window.addEventListener('resize', () => {
            if(cameraBtn && rendererBtn) {
                const cBtn = document.getElementById('three-button-container');
                cameraBtn.aspect = cBtn.clientWidth / cBtn.clientHeight;
                cameraBtn.updateProjectionMatrix();
                rendererBtn.setSize(cBtn.clientWidth, cBtn.clientHeight);
            }
            if(cameraSw && rendererSw) {
                const cSw = document.getElementById('switch-canvas-holder');
                cameraSw.aspect = cSw.clientWidth / cSw.clientHeight;
                cameraSw.updateProjectionMatrix();
                rendererSw.setSize(cSw.clientWidth, cSw.clientHeight);
            }
        });

        if (mobileSpinBtn) {
            mobileSpinBtn.addEventListener('click', () => {
                 if (!isSpinning) {
                     executeSpin();
                 }
            });
        }

        window.onload = () => {
            initThreeButton();
            initThreeSwitch();
            initMachine();
            animate();
        };
    </script>
</body>
</html>
