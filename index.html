<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Milf Machine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: #f8fafc;
        }

        .title-font {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 3px;
        }

        .machine-body {
            background: linear-gradient(145deg, #cbd5e1, #94a3b8);
            box-shadow: 
                inset 0px 5px 10px rgba(255,255,255,0.5),
                inset 0px -5px 15px rgba(0,0,0,0.3),
                0px 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .machine-screen {
            background: #ffffff;
            box-shadow: inset 0px 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .reel-row {
            position: relative;
            width: 100%;
        }

        .reel-row::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .reel-column {
            position: relative;
            overflow: hidden;
            height: 80px;
            flex: 1;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .reel-column:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .reel-inner {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .reel-item {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 800;
            font-size: 0.75rem;
            color: #1e293b;
            padding: 0 0.5rem;
            text-transform: uppercase;
            word-break: break-word;
            line-height: 1.1;
        }

        .glass-output {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            height: 180px;
            transition: opacity 0.5s ease;
            overflow: hidden;
        }

        #three-switch-container {
            position: absolute;
            left: -120px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px; 
            height: 220px; 
            z-index: 20;
            cursor: pointer;
        }

        #three-button-container {
            position: absolute;
            right: -420px;
            top: -400px;
            bottom: -500px;
            width: 420px; 
            z-index: 20;
            cursor: pointer;
        }

        #three-button-container:active, #three-switch-container:active {
            cursor: grabbing;
        }

        @media (max-width: 1024px) {
            #three-switch-container { left: -90px; transform: translateY(-50%) scale(0.8); }
            #three-button-container { right: -300px; top: -300px; bottom: -400px; transform: scale(0.8); transform-origin: top right; }
        }
        @media (max-width: 850px) {
            #three-switch-container { left: -60px; transform: translateY(-50%) scale(0.7); }
            #three-button-container { right: -200px; top: -250px; bottom: -310px; transform: scale(0.7); transform-origin: top right; }
            .reel-item { font-size: 0.75rem; }
        }
        @media (max-width: 768px) {
            #three-switch-container { display: none !important; }
            #three-button-container { display: none !important; }
            .glass-output { height: 160px; padding: 1rem; margin-top: 1rem; }
            .machine-body { padding: 0.75rem; }
            #main-title { font-size: 3.2rem; line-height: 1; margin-bottom: 0.5rem; }
            .reel-item { font-size: 0.65rem; padding: 0 0.15rem; }
        }
        @media (max-width: 640px) {
            #main-title { font-size: 2.6rem; }
            .reel-item { font-size: 0.55rem; padding: 0 0.1rem; }
        }

        /* Particle Burst Animation */
        .burst-line {
            position: absolute;
            width: 4px;
            height: 16px;
            background-color: #ffffff;
            border-radius: 2px;
            transform-origin: center bottom;
            animation: burstOut 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
            left: -2px; /* Center perfectly on click */
            bottom: 0;
        }

        @keyframes burstOut {
            0% { opacity: 1; transform: rotate(var(--rot)) translateY(-15px) scaleY(0.5); }
            100% { opacity: 0; transform: rotate(var(--rot)) translateY(-60px) scaleY(1.2); }
        }
    </style>
</head>

                if (switchLabelDilf) switchLabelDilf.className = 'font-bold text-2xl tracking-widest text-gray-500 transition-colors duration-300 absolute -bottom-8 z-10 drop-shadow-md';
            } else {
                if (switchLabelMilf) switchLabelMilf.className = 'font-bold text-2xl tracking-widest text-gray-500 transition-colors duration-300 absolute -top-8 z-10 drop-shadow-md';
                if (switchLabelDilf) switchLabelDilf.className = 'font-bold text-2xl tracking-widest text-blue-400 transition-colors duration-300 absolute -bottom-8 z-10 drop-shadow-md';
            }

            // Update 3D Button Color and Switch Rotation
            if (typeof spinButtonMesh !== 'undefined' && spinButtonMesh) spinButtonMesh.material.color.setHex(currentMode === 'MILF' ? 0xef4444 : 0x3b82f6);
            if (typeof switchBallMesh !== 'undefined' && switchBallMesh) switchBallMesh.material.color.setHex(currentMode === 'MILF' ? 0xef4444 : 0x3b82f6);
            if (typeof switchToggleGroup !== 'undefined' && switchToggleGroup) targetSwitchRot = currentMode === 'MILF' ? SWITCH_MILF_ROT : SWITCH_DILF_ROT;

            hasSpun = false;

            reelContainers.forEach((container, index) => {
                if(!container) return;
                
                // Add click listener to the parent column for single rerolls
                container.parentElement.onclick = () => spinSingleReel(index);
                container.parentElement.title = "Click to reroll this trait";

                const items = data.reels[index];
                const startIndex = Math.floor(Math.random() * items.length);
                const initialText = items[startIndex];
                currentResults[index] = initialText; // Pre-fill results
                
                container.innerHTML = `<div class="reel-item" data-text="${initialText.replace(/"/g, '&quot;')}">${initialText}</div>`;
                container.style.transition = 'none';
                container.style.transform = `translateY(0px)`;
            });

            outputSentence.innerHTML = '<p class="opacity-50 italic text-center font-normal">Push the button to generate your character...</p>';
            document.getElementById('output-container').style.opacity = '1';
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function handleSpin() {
            if (isSpinning) return;
            isSpinning = true;

            // Target the 3D button depression animation
            targetButtonY = BUTTON_PRESSED_Y;
            
            setTimeout(() => {
                targetButtonY = BUTTON_RESTING_Y; 
                executeSpin();
            }, 150);
        }

        function executeSpin() {
            // Failsafe in case executeSpin is called directly
            isSpinning = true; 
            hasSpun = true;
            
            document.getElementById('output-container').style.opacity = '0.3';
            shutterEl.style.transform = 'translateY(-100%)';
            
            const data = gameData[currentMode];
            let completedReels = 0;

            reelContainers.forEach((container, i) => {
                if(!container) return;
                
                const currentText = currentResults[i] || data.reels[i][0];
                const items = data.reels[i];
                
                // Build a fresh runway so the slots can be spun infinitely
                let html = `<div class="reel-item" data-text="${currentText.replace(/"/g, '&quot;')}">${currentText}</div>`;
                const fullList = [];
                for(let j=0; j<spinMultiplier; j++) {
                    fullList.push(...shuffleArray([...items]));
                }
                
                fullList.forEach(text => {
                    html += `<div class="reel-item" data-text="${text.replace(/"/g, '&quot;')}">${text}</div>`;
                });

                container.style.transition = 'none';
                container.style.transform = `translateY(0px)`;
                container.innerHTML = html;

                // Force CSS reflow
                void container.offsetWidth;

                const duration = 1.5 + (i * 0.4); 
                const targetFinalIndex = Math.floor(Math.random() * items.length);
                const stopIndex = fullList.length - items.length + targetFinalIndex + 1;
                
                container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.1, 1)`;
                container.style.transform = `translateY(-${stopIndex * itemHeight}px)`;

                setTimeout(() => {
                    if(container.children[stopIndex]) {
                        currentResults[i] = container.children[stopIndex].dataset.text;
                    }
                    completedReels++;

                    if (completedReels === reelContainers.length) {
                        finishSpin(currentResults);
                    }
                }, duration * 1000);
            });
        }

        function finishSpin(results) {
            isSpinning = false;
            const data = gameData[currentMode];
            
            const hl = `font-bold text-transparent bg-clip-text bg-gradient-to-r ${data.colors[0]} ${data.colors[1]} drop-shadow-sm`;

            // Cleanly formatted, non-scrolling full sentence paragraph with proper spacing
            const sentenceHtml = `
                <div class="text-left w-full h-full flex flex-col justify-center gap-1.5 md:gap-2 text-xs sm:text-sm md:text-base leading-tight md:leading-snug">
                    <p>This ${data.noun} is a <span class="${hl}">${results[1]}</span> in their <span class="${hl}">${results[0]}</span>.</p>
                    <p>They're known for being <span class="${hl}">${results[2]}</span>.</p>
                    <p>You can usually find them wearing <span class="${hl}">${results[3]}</span> paired with <span class="${hl}">${results[4]}</span> while <span class="${hl}">${results[5]}</span>.</p>
                </div>
            `;

            outputSentence.innerHTML = sentenceHtml;
            document.getElementById('output-container').style.opacity = '1';
        }

        function spinSingleReel(i) {
            if (isSpinning || !hasSpun) return; // Prevent clicking before the shutter is open
            isSpinning = true;
            
            document.getElementById('output-container').style.opacity = '0.3';
            
            const data = gameData[currentMode];
            const container = reelContainers[i];
            
            const currentText = currentResults[i];
            const items = data.reels[i];
            
            // Build a short runway for a fast, snappy single spin
            let html = `<div class="reel-item" data-text="${currentText.replace(/"/g, '&quot;')}">${currentText}</div>`;
            const fullList = [];
            for(let j=0; j<2; j++) {
                fullList.push(...shuffleArray([...items]));
            }
            
            fullList.forEach(text => {
                html += `<div class="reel-item" data-text="${text.replace(/"/g, '&quot;')}">${text}</div>`;
            });

            container.style.transition = 'none';
            container.style.transform = `translateY(0px)`;
            container.innerHTML = html;

            void container.offsetWidth; // Force CSS reflow

            const duration = 0.8; // Fast duration
            const targetFinalIndex = Math.floor(Math.random() * items.length);
            const stopIndex = fullList.length - items.length + targetFinalIndex + 1;
            
            container.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.1, 1)`;
            container.style.transform = `translateY(-${stopIndex * itemHeight}px)`;

            setTimeout(() => {
                if(container.children[stopIndex]) {
                    currentResults[i] = container.children[stopIndex].dataset.text;
                }
                finishSpin(currentResults); // Update sentence with the newly rerolled trait
            }, duration * 1000);
        }

        let rendererBtn, sceneBtn, cameraBtn;
        let buttonGroup, spinButtonMesh;
        const BUTTON_RESTING_Y = 3.8;
        const BUTTON_PRESSED_Y = 1.2;
        let targetButtonY = BUTTON_RESTING_Y;
        let buttonVelocity = 0;
        let isHolding = false;

        function initThreeButton() {
            try {
                const container = document.getElementById('three-button-container');
                if(!container) return;
                
                // Fallbacks to prevent NaN errors
                const width = container.clientWidth || 420;
                const height = container.clientHeight || 500;

                sceneBtn = new THREE.Scene();
                cameraBtn = new THREE.PerspectiveCamera(35, width / height, 0.1, 1000);
                cameraBtn.position.set(0, 24, 75); 
                cameraBtn.lookAt(0, 4, 0);

                rendererBtn = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                rendererBtn.setSize(width, height);
                container.appendChild(rendererBtn.domElement);

                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                sceneBtn.add(ambient);
                
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
                dirLight.position.set(5, 10, 8);
                sceneBtn.add(dirLight);
                
                const spotLight = new THREE.SpotLight(0xffffff, 1.2); 
                spotLight.position.set(-5, 15, 10);
                spotLight.lookAt(new THREE.Vector3(0, 3, 0));
                spotLight.angle = Math.PI / 5;
                spotLight.penumbra = 0.6;
                sceneBtn.add(spotLight);

                buttonGroup = new THREE.Group();
                sceneBtn.add(buttonGroup);

                const baseGeo = new THREE.BoxGeometry(11.0, 400.0, 11.0);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.4 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = -198.0; 
                buttonGroup.add(base);

                const ringGeo = new THREE.TorusGeometry(4.2, 1.0, 32, 64);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.8 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                ring.position.y = 2.0;
                buttonGroup.add(ring);

                const btnGeo = new THREE.CylinderGeometry(3.0, 3.0, 4.0, 64);
                const initialColor = currentMode === 'MILF' ? 0xef4444 : 0x3b82f6;
                
                const buttonMat = new THREE.MeshPhysicalMaterial({ 
                    color: initialColor, 
                    metalness: 0.1, 
                    roughness: 0.15, 
                    clearcoat: 0.6, 
                    clearcoatRoughness: 0.1,
                    reflectivity: 0.5
                });
                
                spinButtonMesh = new THREE.Mesh(btnGeo, buttonMat);
                spinButtonMesh.position.y = BUTTON_RESTING_Y; 
                buttonGroup.add(spinButtonMesh);

                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();
                
                rendererBtn.domElement.addEventListener('pointerdown', (e) => {
                    if(isSpinning) return;
                    const rect = rendererBtn.domElement.getBoundingClientRect();
                    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    raycaster.setFromCamera(mouse, cameraBtn);
                    
                    const intersects = raycaster.intersectObject(buttonGroup, true);
                    if (intersects.length > 0) {
                        isHolding = true;
                        targetButtonY = BUTTON_PRESSED_Y;
                        showBurst(e.clientX, e.clientY);
                    }
                });

                const releaseButton = () => {
                    if (isHolding) {
                        isHolding = false;
                        targetButtonY = BUTTON_RESTING_Y;
                        if (!isSpinning) {
                            executeSpin();
                        }
                    }
                };
                
                rendererBtn.domElement.addEventListener('pointerup', releaseButton);
                rendererBtn.domElement.addEventListener('pointerleave', releaseButton);
            } catch (err) {
                console.error("ThreeJS Button Initialization Error: ", err);
            }
        }

        let rendererSw, sceneSw, cameraSw;
        let switchGroup, switchToggleGroup, switchBallMesh;
        const SWITCH_MILF_ROT = -0.55; 
        const SWITCH_DILF_ROT = 0.55;  
        let targetSwitchRot = SWITCH_MILF_ROT;

        function initThreeSwitch() {
            try {
                const container = document.getElementById('three-switch-container');
                if(!container) return;
                
                const containerWidth = container.clientWidth || 100;
                const containerHeight = container.clientHeight || 220;

                sceneSw = new THREE.Scene();
                cameraSw = new THREE.PerspectiveCamera(40, containerWidth / containerHeight, 0.1, 100);
                cameraSw.position.set(0, 0, 8); 
                cameraSw.lookAt(0, 0, 0);

                rendererSw = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                rendererSw.setSize(containerWidth, containerHeight);
                container.appendChild(rendererSw.domElement);

                const ambient = new THREE.AmbientLight(0xffffff, 0.4);
                sceneSw.add(ambient);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(2, 5, 8);
                sceneSw.add(dirLight);

                switchGroup = new THREE.Group();
                sceneSw.add(switchGroup);

                // Replace flat BoxGeometry with a custom shape to simulate a bevel
                const shape = new THREE.Shape();
                const pWidth = 2.4, pHeight = 4.2, radius = 0.2;
                
                // Draw rounded rectangle
                shape.moveTo(-pWidth/2 + radius, pHeight/2);
                shape.lineTo(pWidth/2 - radius, pHeight/2);
                shape.quadraticCurveTo(pWidth/2, pHeight/2, pWidth/2, pHeight/2 - radius);
                shape.lineTo(pWidth/2, -pHeight/2 + radius);
                shape.quadraticCurveTo(pWidth/2, -pHeight/2, pWidth/2 - radius, -pHeight/2);
                shape.lineTo(-pWidth/2 + radius, -pHeight/2);
                shape.quadraticCurveTo(-pWidth/2, -pHeight/2, -pWidth/2, -pHeight/2 + radius);
                shape.lineTo(-pWidth/2, pHeight/2 - radius);
                shape.quadraticCurveTo(-pWidth/2, pHeight/2, -pWidth/2 + radius, pHeight/2);

                const extrudeSettings = {
                    steps: 1,
                    depth: 0.2,
                    bevelEnabled: true,
                    bevelThickness: 0.1,
                    bevelSize: 0.1,
                    bevelOffset: 0,
                    bevelSegments: 3
                };

                const plateGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                // Adjust position since ExtrudeGeometry builds from the bottom left by default if not centered carefully, 
                // but our shape uses center coordinates.
                const plateMat = new THREE.MeshStandardMaterial({ color: 0x5c6b7d, roughness: 0.8, metalness: 0.2 });
                const plate = new THREE.Mesh(plateGeo, plateMat);
                switchGroup.add(plate);

                // Screws
                const screwGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16);
                screwGeo.rotateX(Math.PI / 2);
                const screwMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.5 });
                const topScrew = new THREE.Mesh(screwGeo, screwMat);
                topScrew.position.set(0, 1.4, 0.25);
                switchGroup.add(topScrew);
                const bottomScrew = new THREE.Mesh(screwGeo, screwMat);
                bottomScrew.position.set(0, -1.4, 0.25);
                switchGroup.add(bottomScrew);

                // Pronounced Collar (Large dark circle base matching the photo)
                const collarGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.15, 32);
                collarGeo.rotateX(Math.PI / 2);
                const collarMat = new THREE.MeshStandardMaterial({ color: 0x1a1d20, roughness: 0.9, metalness: 0.2 });
                const collar = new THREE.Mesh(collarGeo, collarMat);
                collar.position.z = 0.25;
                switchGroup.add(collar);

                // Switch Toggle Group
                switchToggleGroup = new THREE.Group();
                switchToggleGroup.position.z = 0.2;
                switchGroup.add(switchToggleGroup);

                // Rod (Thin black stick)
                const rodGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5, 16);
                rodGeo.rotateX(Math.PI / 2);
                const rodMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.3 });
                const rod = new THREE.Mesh(rodGeo, rodMat);
                rod.position.z = 0.75;
                switchToggleGroup.add(rod);

                // Ball (Glossy red/blue)
                const ballGeo = new THREE.SphereGeometry(0.35, 32, 32);
                const initialBallColor = currentMode === 'MILF' ? 0xef4444 : 0x3b82f6;
                const ballMat = new THREE.MeshPhysicalMaterial({ 
                    color: initialBallColor, 
                    metalness: 0.1, 
                    roughness: 0.1, 
                    clearcoat: 0.8, 
                    clearcoatRoughness: 0.1,
                    reflectivity: 0.5
                });
                switchBallMesh = new THREE.Mesh(ballGeo, ballMat);
                switchBallMesh.position.z = 1.5;
                switchToggleGroup.add(switchBallMesh);

                targetSwitchRot = currentMode === 'MILF' ? SWITCH_MILF_ROT : SWITCH_DILF_ROT;

                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();
                
                rendererSw.domElement.addEventListener('pointerdown', (e) => {
                    if(isSpinning) return;
                    const rect = rendererSw.domElement.getBoundingClientRect();
                    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    raycaster.setFromCamera(mouse, cameraSw);
                    const intersects = raycaster.intersectObject(switchGroup, true);
                    if (intersects.length > 0) {
                        currentMode = currentMode === 'MILF' ? 'DILF' : 'MILF';
                        initMachine();
                    }
                });
            } catch (err) {
                console.error("ThreeJS Switch Initialization Error: ", err);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (spinButtonMesh && rendererBtn) {
                const displacement = targetButtonY - spinButtonMesh.position.y;
                buttonVelocity += displacement * 0.4;
                buttonVelocity *= 0.7;
                spinButtonMesh.position.y += buttonVelocity;
                rendererBtn.render(sceneBtn, cameraBtn);
            }

            if (switchToggleGroup && rendererSw) {
                switchToggleGroup.rotation.x += (targetSwitchRot - switchToggleGroup.rotation.x) * 0.2;
                rendererSw.render(sceneSw, cameraSw);
            }
        }

        // --- TUTORIAL LOGIC ---
        let currentTutorialStep = 0;
        
        function startTutorial() {
            currentTutorialStep = 0;
            const overlay = document.getElementById('tutorial-overlay');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            showTutorialStep();
        }

        function endTutorial() {
            const overlay = document.getElementById('tutorial-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
            localStorage.setItem('milfMachineTutorialActive', 'seen');
        }

        function nextTutorialStep() {
            currentTutorialStep++;
            if (currentTutorialStep >= 3) {
                endTutorial();
            } else {
                showTutorialStep();
            }
        }

        function showTutorialStep() {
            const tooltip = document.getElementById('tutorial-tooltip');
            const arrow = document.getElementById('tutorial-arrow');
            const titleEl = document.getElementById('tutorial-title');
            const textEl = document.getElementById('tutorial-text');
            const nextBtn = document.getElementById('tutorial-next');
            
            const isMobile = window.innerWidth <= 768;
            
            const steps = [
                {
                    title: "1. The Lever",
                    text: "Push the big lever (or tap Spin on mobile) to randomly generate your character!",
                    targetId: isMobile ? 'mobile-spin-btn' : 'three-button-container',
                    placement: isMobile ? 'top' : 'left'
                },
                {
                    title: "2. Precision Rerolls",
                    text: "Don't like an outfit or hobby? Click any individual slot to quickly reroll just that specific trait!",
                    targetId: 'reel-4', // Middle bottom reel
                    placement: 'bottom'
                },
                {
                    title: "3. Swap Modes",
                    text: "Flick the switch to swap between creating Mother or Father characters!",
                    targetId: isMobile ? 'mobile-mode-toggle' : 'three-switch-container',
                    placement: isMobile ? 'bottom' : 'right'
                }
            ];

            const step = steps[currentTutorialStep];
            titleEl.innerText = step.title;
            textEl.innerText = step.text;
            nextBtn.innerText = currentTutorialStep === 2 ? "Let's Go!" : "Next";
            
            const target = document.getElementById(step.targetId);
            if (!target) return;
            
            const rect = target.getBoundingClientRect();
            arrow.className = 'absolute w-5 h-5 bg-white transform rotate-45 pointer-events-none';
            
            let top = 0;
            let left = 0;
            const tWidth = 280;
            const tHeight = 160; 
            
            if (step.placement === 'left') {
                left = rect.left - tWidth - 20;
                top = rect.top + (rect.height / 2) - (tHeight / 2);
                arrow.classList.add('top-1/2', '-mt-2.5', '-right-2.5', 'border-t-4', 'border-r-4');
            } else if (step.placement === 'right') {
                left = rect.right + 20;
                top = rect.top + (rect.height / 2) - (tHeight / 2);
                arrow.classList.add('top-1/2', '-mt-2.5', '-left-2.5', 'border-b-4', 'border-l-4');
            } else if (step.placement === 'top') {
                left = rect.left + (rect.width / 2) - (tWidth / 2);
                top = rect.top - tHeight - 20;
                arrow.classList.add('-bottom-2.5', 'left-1/2', '-ml-2.5', 'border-b-4', 'border-r-4');
            } else if (step.placement === 'bottom') {
                left = rect.left + (rect.width / 2) - (tWidth / 2);
                top = rect.bottom + 20;
                arrow.classList.add('-top-2.5', 'left-1/2', '-ml-2.5', 'border-t-4', 'border-l-4');
            }
            
            // Keep on screen
            if (left < 10) left = 10;
            if (left + tWidth > window.innerWidth - 10) left = window.innerWidth - tWidth - 10;
            if (top < 10) top = 10;
            
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        window.addEventListener('resize', () => {
            if(cameraBtn && rendererBtn) {
                const cBtn = document.getElementById('three-button-container');
                if(cBtn && cBtn.clientHeight > 0) {
                    cameraBtn.aspect = cBtn.clientWidth / cBtn.clientHeight;
                    cameraBtn.updateProjectionMatrix();
                    rendererBtn.setSize(cBtn.clientWidth, cBtn.clientHeight);
                }
            }
            if(cameraSw && rendererSw) {
                const cSw = document.getElementById('three-switch-container');
                if(cSw && cSw.clientHeight > 0) {
                    cameraSw.aspect = cSw.clientWidth / cSw.clientHeight;
                    cameraSw.updateProjectionMatrix();
                    rendererSw.setSize(cSw.clientWidth, cSw.clientHeight);
                }
            }
        });

        // Ensure mobile button click utilizes strict handleSpin logic
        if (mobileSpinBtn) {
            mobileSpinBtn.addEventListener('click', (e) => {
                if (!isSpinning) {
                    showBurst(e.clientX, e.clientY);
                }
                handleSpin();
            });
        }

        window.onload = () => {
            initThreeButton();
            initThreeSwitch();
            initMachine();
            animate();

            // Check if user has seen tutorial, if not, show it
            if (!localStorage.getItem('milfMachineTutorialActive')) {
                setTimeout(startTutorial, 500);
            }
        };
    </script>
</body>
</html>
